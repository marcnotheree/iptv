<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>IPTV Dark Hub Pro v2.0</title>
  <style>
    :root {
      --bg: #07090f;
      --panel: #0f121a;
      --panel-2: #161b26;
      --text: #e1e7ff;
      --muted: #848da8;
      --accent: #5e79ff;
      --accent-rgb: 94, 121, 255;
      --success: #2ec4b6;
      --danger: #ff5c7c;
      --border: #22293d;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
      --radius: 16px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 3000;
      transition: var(--transition);
    }

    .sidebar-header { padding: 24px; border-bottom: 1px solid var(--border); }
    .sidebar-header h1 { 
      font-size: 1.3rem; margin: 0; font-weight: 800; 
      background: linear-gradient(to right, #fff, var(--muted)); 
      -webkit-background-clip: text; background-clip: text; 
      -webkit-text-fill-color: transparent; 
    }
    
    .controls { padding: 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; flex: 1; scrollbar-width: thin; }
    .nav-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .filter-group { display: flex; flex-direction: column; gap: 8px; }
    .filter-label { color: var(--accent); font-weight: 800; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }

    input, select {
      width: 100%; background: #0a0d14; color: var(--text); border: 1px solid var(--border);
      padding: 12px 16px; border-radius: 12px; font-size: 0.9rem; outline: none; transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--accent); }

    .nav-btn {
      width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border);
      background: var(--panel-2); color: #fff; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; gap: 12px; transition: var(--transition);
    }
    .nav-btn:hover { border-color: var(--accent); background: rgba(var(--accent-rgb), 0.1); }
    .nav-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(var(--accent-rgb), 0.15); }

    .toggle-btn {
      width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border);
      background: var(--panel-2); color: var(--muted); font-size: 0.85rem; font-weight: 700;
      cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: var(--transition);
    }
    .toggle-btn.active { background: rgba(var(--accent-rgb), 0.1); border-color: var(--accent); color: var(--accent); }

    /* Main Area */
    .main {
      padding: 0;
      overflow-y: auto;
      background: radial-gradient(circle at 50% -20%, #1a1f35 0%, var(--bg) 70%);
      scrollbar-width: thin;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .view-container {
      display: none;
      padding: 30px;
      width: 100%;
      max-width: 1600px;
      margin: 0 auto;
      flex-direction: column;
      gap: 30px;
      animation: fadeIn 0.4s ease;
    }
    .view-container.active { display: flex; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Player View */
    .player-layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 30px;
      align-items: flex-start;
    }

    .player-column { display: flex; flex-direction: column; gap: 15px; min-width: 0; }
    .player-title { font-size: 1.8rem; margin: 0; font-weight: 800; color: #fff; }
    
    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }
    #iframePlayer { width: 100%; height: 100%; display: block; border: none; }

    .epg-container {
      background: rgba(var(--accent-rgb), 0.03);
      border-radius: 20px;
      padding: 24px;
      border: 1px solid rgba(var(--accent-rgb), 0.1);
      display: flex;
      flex-direction: column;
      gap: 20px;
      height: 100%;
    }

    .epg-current { display: flex; flex-direction: column; gap: 10px; }
    .epg-value { color: #fff; font-weight: 700; font-size: 1.1rem; line-height: 1.4; }
    .progress-bar { height: 6px; background: #22293d; border-radius: 3px; width: 100%; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); transition: width 1s linear; }

    .upcoming-list { display: flex; flex-direction: column; gap: 12px; }
    .upcoming-item { display: grid; grid-template-columns: 65px 1fr; gap: 15px; align-items: center; font-size: 0.9rem; color: var(--muted); }
    .upcoming-time { font-weight: 800; color: var(--accent); }
    .upcoming-title { font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Comparison Grid */
    .compare-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 20px;
    }

    .compare-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      transition: var(--transition);
      cursor: pointer;
    }
    .compare-card:hover { border-color: var(--accent); transform: translateY(-4px); }
    .compare-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
    .compare-name { font-weight: 800; font-size: 1.1rem; color: #fff; }
    .compare-live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 10px var(--danger); animation: pulse 1.5s infinite; }
    
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

    /* Grids */
    .section-label { font-size: 1rem; font-weight: 800; margin: 20px 0 15px 0; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
    .channel-card {
      padding: 20px; border-radius: var(--radius); background: var(--panel-2); border: 1px solid var(--border);
      cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; gap: 12px;
    }
    .channel-card:hover { border-color: var(--accent); transform: translateY(-4px); }
    .channel-card.active { border-color: var(--accent); background: rgba(var(--accent-rgb), 0.1); }
    .card-title { font-weight: 800; font-size: 1rem; margin: 0; color: #fff; }
    .card-meta { display: flex; justify-content: space-between; align-items: center; margin-top: auto; font-size: 0.75rem; color: var(--muted); }

    /* Modal Overlay */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
    .modal-content { width: 100%; max-width: 700px; max-height: 85vh; background: var(--panel); border-radius: 24px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 30px 100px rgba(0,0,0,1); }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .modal-body { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; scrollbar-width: thin; }

    #welcomeHero { padding: 100px 40px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px; }
    #welcomeHero h2 { font-size: 3.5rem; margin: 0; font-weight: 900; background: linear-gradient(45deg, #fff, var(--accent)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    #welcomeHero p { font-size: 1.2rem; color: var(--muted); max-width: 600px; }

    .menu-btn {
      position: fixed; bottom: 24px; right: 24px; width: 64px; height: 64px; border-radius: 22px;
      background: var(--accent); color: #fff; border: none; box-shadow: 0 10px 30px rgba(var(--accent-rgb), 0.4);
      z-index: 4000; cursor: pointer; display: none; font-size: 1.5rem; justify-content: center; align-items: center;
    }

    .hidden { display: none !important; }
    .skeleton { background: linear-gradient(90deg, var(--panel-2) 25%, var(--border) 50%, var(--panel-2) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    @media (max-width: 1300px) {
      .player-layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: fixed; left: 0; top: 0; width: 300px; height: 100vh; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); box-shadow: 30px 0 100px rgba(0,0,0,0.8); }
      .menu-btn { display: flex; }
      .channel-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
      .compare-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

            </div>

        </section>

        <div id="favSec" class="hidden"><div class="section-label">★ Favorites</div><div id="favGrid" class="channel-grid"></div></div>
        <div id="exploreSec"><div class="section-label">All Channels</div><div id="exploreGrid" class="channel-grid"></div></div>

        </div>

    </main>

    async function fetchEPG(channel) {
      const slug = CINEMAGIA_MAP[channel.name];
      if (!slug) return null;
      
      const roTime = new Date(new Date().toLocaleString("en-US", {timeZone: "Europe/Bucharest"}));
      const cacheKey = `${slug}_${roTime.toDateString()}_${roTime.getHours() < 5 ? 'early' : 'day'}`;
      
      if (state.scheduleCache[cacheKey]) {
        return state.scheduleCache[cacheKey].map(p => ({ ...p, start: new Date(p.start) }));
      }

      // If between midnight and 5 AM, fetch yesterday's schedule to get late-night programs
      const suffix = roTime.getHours() < 5 ? 'ieri/' : '';
      const url = `https://www.cinemagia.ro/program-tv/${slug}/${suffix}`;
      
      for (let i = 0; i < PROXIES.length; i++) {
        try {
          const res = await fetch(PROXIES[i] + encodeURIComponent(url), { signal: AbortSignal.timeout(10000) });
          if (!res.ok) continue;

          let html = "";
          if (PROXIES[i].includes("/get?")) {
            const json = await res.json();
            html = json.contents;
          } else {
            html = await res.text();
          }

          if (!html || html.length < 1000) continue;

          const doc = new DOMParser().parseFromString(html, 'text/html');
          const schedule = [];
          const baseDate = new Date(roTime);
          baseDate.setHours(0,0,0,0);
          if (roTime.getHours() < 5) baseDate.setDate(baseDate.getDate() - 1);

          // ULTRA-ROBUST TIME-BASED SCANNER
          const walker = document.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT);
          let node;
          while (node = walker.nextNode()) {
            const text = node.textContent.trim();
            const timeMatch = text.match(/^(\d{1,2}:\d{2})$/);
            if (timeMatch) {
              const time = timeMatch[1];
              // Title is usually the next text node or child of next element
              let title = "";
              let next = node.parentElement.nextElementSibling;
              if (next) title = next.textContent.trim().split('\n')[0];
              
              if (title.length > 1) {
                const [h, m] = time.split(':').map(Number);
                let start = new Date(baseDate);
                start.setHours(h, m, 0, 0);
                if (schedule.length > 0 && start < schedule[schedule.length-1].start) start.setDate(start.getDate() + 1);
                schedule.push({ start, title });
              }
            }
          }

          if (schedule.length > 3) {
            state.scheduleCache[cacheKey] = schedule;
            localStorage.setItem('iptv-epg-cache-v4', JSON.stringify(state.scheduleCache));
            return schedule;
          }
        } catch (e) { console.warn(`Proxy ${i} failed`); }
      }
      return null;
    }

    function getNowAndNext(schedule) {
      if (!schedule || !schedule.length) return null;
      const roNow = new Date(new Date().toLocaleString("en-US", {timeZone: "Europe/Bucharest"}));
      const currentIdx = schedule.findIndex((p, i) => {
        const next = schedule[i+1];
        return p.start <= roNow && (!next || next.start > roNow);
      });
      if (currentIdx === -1) {
        if (roNow < schedule[0].start) return { current: null, next: schedule[0], progress: 0 };
        return null;
      }
      const current = schedule[currentIdx];
      const next = schedule[currentIdx+1];
      let progress = 0;
      if (next) progress = ((roNow - current.start) / (next.start - current.start)) * 100;
      return { current, next, progress: Math.min(100, Math.max(0, progress)) };
    }

    async function updateEPG() {
      if (!state.selected) return;
      els.epgBox.classList.remove('hidden');
      els.epgNow.textContent = "Loading schedule...";
      els.epgProgress.style.width = '0%';
      els.epgUpcoming.innerHTML = '<div class="skeleton" style="height:50px; margin-bottom:10px;"></div><div class="skeleton" style="height:50px;"></div>';
      const schedule = await fetchEPG(state.selected);
      if (schedule) {
        const data = getNowAndNext(schedule);
        if (data && data.current) {
          els.epgNow.textContent = data.current.title;
          els.epgProgress.style.width = data.progress + '%';
          const roNow = new Date(new Date().toLocaleString("en-US", {timeZone: "Europe/Bucharest"}));
          const upcoming = schedule.filter(p => p.start > roNow).slice(0, 3);
          els.epgUpcoming.innerHTML = upcoming.map(p => `<div class="upcoming-item"><span class="upcoming-time">${p.start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span><span class="upcoming-title">${p.title}</span></div>`).join('') || '<div style="color:var(--muted); font-size:0.8rem;">End of schedule</div>';
        } else if (data && data.next) {
          els.epgNow.textContent = "Starts at " + data.next.start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
          els.epgProgress.style.width = '0%';
          els.epgUpcoming.innerHTML = `<div class="upcoming-item"><span class="upcoming-time">${data.next.start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span><span class="upcoming-title">${data.next.title}</span></div>`;
        }
      } else {
        els.epgNow.innerHTML = '<span style="color:var(--danger)">EPG Temporarily Restricted</span> <button onclick="updateEPG()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-weight:bold; font-size:0.8rem;">[Retry]</button>';
        els.epgUpcoming.innerHTML = "";
        els.epgProgress.style.width = '0%';
      }
    }

    async function renderCompare() {
      const targets = state.all.filter(c => state.pins.has(c.name) || state.favs.has(c.name));
      if (!targets.length) {
        els.grids.compare.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 100px 20px; color: var(--muted); border: 2px dashed var(--border); border-radius: 20px;"><h3>No monitored channels</h3><p>Pin or Favorite channels from the Home Explorer to monitor them here.</p></div>';
        return;

      els.grids.compare.innerHTML = targets.map(c => `<div class="compare-card skeleton" id="comp-${CINEMAGIA_MAP[c.name] || Math.random().toString(36).substr(2, 9)}"><div class="compare-header"><span class="compare-name">${c.name}</span></div><div style="height: 100px;"></div></div>`).join('');
      
      // Parallel loading for high speed
      targets.forEach(async (channel) => {
        const schedule = await fetchEPG(channel);

        const card = document.querySelector(`[id^="comp-${slug}"]`);

          } else if (data && data.next) {
             card.innerHTML = `<div class="compare-header"><span class="compare-name">${channel.name}</span></div><div style="padding:10px 0; color:var(--accent); font-weight:700;">Upcoming: ${data.next.start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div><div style="font-size:0.9rem;">${data.next.title}</div>`;
          } else {
             card.innerHTML = `<div class="compare-header"><span class="compare-name">${channel.name}</span></div><div style="padding:20px; color:var(--muted); font-size:0.9rem;">No active program found</div>`;
          }
        } else {
          card.innerHTML = `<div class="compare-header"><span class="compare-name">${channel.name}</span></div><div style="padding:20px; color:var(--danger); font-size:0.9rem;">EPG Unavailable</div>`;
        }
      });
    }

    function render() {
      const q = state.filters.search.toLowerCase();
      const filtered = state.all.filter(c => {
        const ms = c.name.toLowerCase().includes(q);
        const mc = state.filters.category === 'all' || c.category === state.filters.category;
        const mf = !state.filters.onlyFavs || state.favs.has(c.name);
        const mp = !state.filters.onlyPins || state.pins.has(c.name);
        return ms && mc && mf && mp;
      });
      const pinned = filtered.filter(c => state.pins.has(c.name));
      const favs = filtered.filter(c => state.favs.has(c.name) && !state.pins.has(c.name));
      const others = filtered.filter(c => !state.pins.has(c.name) && !state.favs.has(c.name));
      const drawGrid = (container, list) => {
        container.innerHTML = list.map(c => `<div class="channel-card ${state.selected?.name === c.name ? 'active' : ''}" onclick="window.playByName('${c.name.replace(/'/g, "\\'")}')"><h3 class="card-title">${c.name}</h3><div class="card-meta"><span>${c.category}</span><div style="display:flex; gap:6px;">${state.pins.has(c.name)?'📌':''}${state.favs.has(c.name)?'★':''}</div></div></div>`).join('') || (q ? '<div style="padding:20px; color:var(--muted);">No matches</div>' : '');
      };
      els.grids.sections.pinned.classList.toggle('hidden', !pinned.length);
      els.grids.sections.favs.classList.toggle('hidden', !favs.length);
      drawGrid(els.grids.pinned, pinned); drawGrid(els.grids.favs, favs); drawGrid(els.grids.explore, others);
      els.counts.fav.textContent = state.favs.size;
      els.counts.pin.textContent = state.pins.size;
    }

          const ov = document.createElement('div');
          ov.className = 'modal-overlay';
          ov.innerHTML = `<div class="modal-content"><div class="modal-header"><h2 style="margin:0; color:#fff;">${state.selected.name} Full Schedule</h2><button class="nav-btn" style="width:auto; padding:8px 15px;" onclick="this.closest('.modal-overlay').remove()">✕</button></div><div class="modal-body">${sch.map(p => `<div style="padding:15px; border-radius:12px; background:var(--panel-2); border: 1px solid var(--border); display: flex; gap: 20px;"><b style="color:var(--accent); min-width: 65px;">${p.start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</b><span style="font-weight:700;">${p.title}</span></div>`).join('')}</div></div>`;

        state.pins.has(state.selected.name) ? state.pins.delete(state.selected.name) : state.pins.add(state.selected.name);
        localStorage.setItem('iptv-pins', JSON.stringify([...state.pins]));
        document.getElementById('btnPinCur').classList.toggle('active');
        render();
      };
      document.getElementById('btnFavCur').onclick = () => {
        if(!state.selected) return;
        state.favs.has(state.selected.name) ? state.favs.delete(state.selected.name) : state.favs.add(state.selected.name);
        localStorage.setItem('iptv-favs', JSON.stringify([...state.favs]));
        document.getElementById('btnFavCur').classList.toggle('active');
        render();
      };
      document.getElementById('btnShare').onclick = () => {
        const url = window.location.origin + window.location.pathname + "?ch=" + encodeURIComponent(state.selected.name);
        navigator.clipboard.writeText(url).then(() => alert("Link copied!")).catch(() => alert("Failed to copy link."));
      };
    }
    init();
  </script>
</body>
</html>
