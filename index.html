<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>IPTV Dark Hub - Pro Streamer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
  <style>
    :root {
      --bg: #07090f;
      --panel: #0f121a;
      --panel-2: #161b26;
      --text: #e1e7ff;
      --muted: #848da8;
      --accent: #5e79ff;
      --accent-rgb: 94, 121, 255;
      --success: #2ec4b6;
      --danger: #ff5c7c;
      --border: #22293d;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
      --radius: 16px;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
      transition: var(--transition);
    }

    .sidebar-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-header h1 { 
      font-size: 1.4rem; margin: 0; font-weight: 800; 
      background: linear-gradient(to right, #fff, var(--muted)); 
      -webkit-background-clip: text; background-clip: text; 
      -webkit-text-fill-color: transparent; 
    }
    
    .controls { padding: 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; flex: 1; }
    
    .filter-group { display: flex; flex-direction: column; gap: 8px; }
    .filter-label { color: var(--accent); font-weight: 800; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }

    input, select {
      width: 100%;
      background: #0a0d14;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.95rem;
      outline: none;
      transition: var(--transition);
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(var(--accent-rgb), 0.15); }

    .toggle-btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: var(--transition);
    }
    .toggle-btn.active { background: rgba(var(--accent-rgb), 0.1); border-color: var(--accent); color: var(--accent); }

    /* Main Content */
    .main {
      padding: 0;
      overflow-y: auto;
      background: radial-gradient(circle at 50% -20%, #1a1f35 0%, var(--bg) 70%);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      display: flex;
      flex-direction: column;
    }

    .content-wrapper {
      padding: 24px 40px;
      width: 100%;
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* Player Section */
    #playerSection {
      display: none;
      flex-direction: column;
      gap: 20px;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .player-layout {
      display: grid;
      grid-template-columns: 1.8fr 1fr;
      gap: 24px;
      align-items: start;
    }

    .player-header { display: flex; flex-direction: column; gap: 12px; }
    .player-title { font-size: 1.8rem; margin: 0; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .epg-container {
      background: rgba(var(--accent-rgb), 0.05);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid rgba(var(--accent-rgb), 0.1);
      display: flex;
      flex-direction: column;
      gap: 16px;
      height: 100%;
    }

    .epg-current { display: flex; flex-direction: column; gap: 8px; }
    .epg-upcoming { display: flex; flex-direction: column; gap: 10px; border-top: 1px solid var(--border); padding-top: 16px; }
    
    .epg-value { color: #fff; font-weight: 700; font-size: 1.1rem; line-height: 1.4; }
    .progress-bar { height: 6px; background: #22293d; border-radius: 3px; width: 100%; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); transition: width 1s linear; }

    .upcoming-list { display: flex; flex-direction: column; gap: 8px; }
    .upcoming-item { display: grid; grid-template-columns: 60px 1fr; gap: 12px; align-items: center; font-size: 0.85rem; color: var(--muted); }
    .upcoming-time { font-weight: 800; color: var(--accent); }
    .upcoming-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }

    .video-wrapper {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    #videoPlayer, #iframePlayer { width: 100%; height: 100%; display: block; border: none; }

    .player-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
    .action-btn {
      padding: 10px 18px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: var(--transition);
      font-size: 0.85rem;
    }
    .action-btn:hover { background: #1e2538; border-color: var(--muted); }
    .action-btn.active.pin { border-color: var(--success); color: var(--success); }
    .action-btn.active.fav { border-color: #ffd166; color: #ffd166; }

    /* Channel Grid */
    .section-header { 
      font-size: 1.1rem; font-weight: 800; margin: 24px 0 16px 0; 
      display: flex; align-items: center; gap: 12px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .section-header span { background: var(--border); height: 1px; flex: 1; }

    .channel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .channel-card {
      padding: 20px;
      border-radius: var(--radius);
      background: var(--panel-2);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .channel-card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .channel-card.active { border-color: var(--accent); background: rgba(var(--accent-rgb), 0.1); }
    
    .card-title { font-weight: 800; font-size: 1.1rem; margin: 0; color: #fff; line-height: 1.3; }
    .card-tag { font-size: 0.6rem; padding: 3px 8px; border-radius: 6px; background: #1e2538; color: #a5b4fc; border: 1px solid #2d3755; font-weight: 800; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; font-size: 0.8rem; color: var(--muted); }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
    .modal-content { width: 100%; max-width: 800px; max-height: 85vh; background: var(--panel); border-radius: 24px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .modal-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .modal-body { padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }

    #welcomeHero {
      padding: 100px 40px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    #welcomeHero h2 { font-size: 3.5rem; margin: 0; font-weight: 900; }
    #welcomeHero p { color: var(--muted); font-size: 1.2rem; max-width: 600px; }

    .menu-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 64px;
      height: 64px;
      border-radius: 22px;
      background: var(--accent);
      color: #fff;
      border: none;
      box-shadow: 0 10px 30px rgba(var(--accent-rgb), 0.4);
      z-index: 1000;
      cursor: pointer;
      display: none;
      font-size: 1.5rem;
    }

    @media (max-width: 1300px) {
      .player-layout { grid-template-columns: 1fr; }
      .epg-container { height: auto; }
    }

    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: fixed; left: 0; top: 0; width: 320px; height: 100vh; transform: translateX(-100%); background: var(--panel); box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
      .sidebar.open { transform: translateX(0); }
      .menu-toggle { display: flex; align-items: center; justify-content: center; }
      .content-wrapper { padding: 20px; }
      .channel-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
    }
  </style>
</head>

          <select id="categorySelect"><option value="all">All Categories</option></select>
        </div>

            <button id="togglePins" class="toggle-btn"><span>📌 Pinned</span><span id="pinCount"></span></button>
          </div>
        </div>
      </div>
    </aside>

    <main class="main" id="mainScroll">
      <div id="welcomeHero">
        <h2>Premium Streamer</h2>
        <p>Premium IPTV Experience. Select a Romanian channel from the grid to begin.</p>
      </div>

      <div class="content-wrapper">
        <section id="playerSection">
          <div class="player-layout">
            <div class="player-header">
              <h2 class="player-title" id="playerTitle">Channel Name</h2>
              <div class="video-wrapper">
                <video id="videoPlayer" controls playsinline class="hidden"></video>
                <iframe id="iframePlayer" allow="autoplay; fullscreen" class="hidden"></iframe>
                <div id="playerOverlay" class="overlay">
                  <div class="spinner"></div>
                  <p>Connecting...</p>

              </div>
              <div class="player-actions">
                <button id="btnPin" class="action-btn pin">📌 <span>Pin</span></button>
                <button id="btnFav" class="action-btn fav">★ <span>Favorite</span></button>
                <button id="btnSchedule" class="action-btn">📅 <span>Full Schedule</span></button>
                <button id="btnShare" class="action-btn">🔗 <span>Share</span></button>
              </div>
            </div>

            <div id="epgBox" class="epg-container hidden">
              <div class="epg-current">
                <span class="filter-label">On Air Now</span>
                <span class="epg-value" id="epgNow">Loading info...</span>
                <div class="progress-bar"><div id="epgProgress" class="progress-fill"></div></div>
              </div>
              <div class="epg-upcoming">
                <span class="filter-label">Coming Up Next</span>
                <div id="epgUpcomingList" class="upcoming-list"></div>
              </div>
            </div>
          </div>
        </section>

        <div id="pinnedSection" class="hidden">
          <div class="section-header">Pinned Channels <span></span></div>
          <div id="pinnedGrid" class="channel-grid"></div>
        </div>
        <div id="favoritesSection" class="hidden">
          <div class="section-header">Your Favorites <span></span></div>
          <div id="favoritesGrid" class="channel-grid"></div>
        </div>
        <div id="exploreSection">
          <div class="section-header">Explore All Channels <span></span></div>
          <div id="exploreGrid" class="channel-grid"></div>
        </div>
      </div>
    </main>
  </div>

    async function fetchCinemagia(channel) {
      const slug = CINEMAGIA_MAP[channel.name];
      if (!slug) return null;
      try {
        const url = `${PROXY}${encodeURIComponent(`https://www.cinemagia.ro/program-tv/post/${slug}/`)}`;
        const res = await fetch(url);
        const html = await res.text();
        const doc = new DOMParser().parseFromString(html, 'text/html');
        const roDate = new Intl.DateTimeFormat('en-CA', {timeZone:'Europe/Bucharest'}).format(new Date());
        const logoCells = Array.from(doc.querySelectorAll('td.container_logo'));
        let colIdx = logoCells.findIndex(td => td.getAttribute('data-iso-date') === roDate) % 7;
        if (colIdx < 0) colIdx = 0;
        const eventCells = Array.from(doc.querySelectorAll('td.container_events'));
        const schedule = [];
        const baseDate = new Date(new Date().toLocaleString("en-US", {timeZone: "Europe/Bucharest"}));
        baseDate.setHours(0,0,0,0);
        for (let i = colIdx; i < eventCells.length; i += 7) {
          const cell = eventCells[i];
          if (!cell) continue;
          cell.querySelectorAll('table.events tr').forEach(row => {
            const time = row.querySelector('td.ora div')?.textContent?.trim();
            const title = row.querySelector('.title')?.textContent?.trim();
            if (time && title) {
              const [h, m] = time.split(':').map(Number);
              const start = new Date(baseDate);
              start.setHours(h, m, 0, 0);
              if (schedule.length > 0 && start < schedule[schedule.length-1].start) start.setDate(start.getDate()+1);
              schedule.push({ start, title, desc: row.querySelector('.info')?.textContent?.trim() || "" });
            }
          });
        }
        return schedule.sort((a,b) => a.start - b.start);
      } catch(e) { return null; }
    }

    async function updateEPG() {
      if (!state.selected) return;
      const roNow = new Date(new Date().toLocaleString("en-US", {timeZone: "Europe/Bucharest"}));
      const schedule = await fetchCinemagia(state.selected);
      if (schedule && schedule.length > 0) {
        state.schedule = schedule;
        els.epgBox.classList.remove('hidden');
        const current = schedule.find((p, i) => {
          const next = schedule[i+1];
          return p.start <= roNow && (!next || next.start > roNow);
        });
        const upcoming = schedule.filter(p => p.start > roNow).slice(0, 3);
        if (current) {
          const nextStart = upcoming[0]?.start || new Date(current.start.getTime() + 2*3600000);
          const progress = Math.min(100, Math.max(0, ((roNow - current.start) / (nextStart - current.start)) * 100));
          els.epgNow.textContent = current.title;
          els.epgProgress.style.width = progress + '%';
        }
        els.epgUpcoming.innerHTML = upcoming.map(p => `
          <div class="upcoming-item">
            <span class="upcoming-time">${p.start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
            <span class="upcoming-title">${p.title}</span>
          </div>
        `).join('') || '<div class="empty-msg">End of daily schedule</div>';
      } else {
        els.epgBox.classList.add('hidden');
      }
    }

    function play(channel) {
      state.selected = channel;
      els.welcomeHero.style.display = 'none';
      els.playerSection.style.display = 'flex';
      els.playerTitle.textContent = channel.name;
      els.playerOverlay.classList.remove('hidden');
      if (state.hls) { state.hls.destroy(); state.hls = null; }
      
      els.video.classList.add('hidden');
      els.iframe.classList.add('hidden');

      // Rule: canals-tv.net embeds MUST use iframe with NO restrictions
      const isEmbedPage = channel.embed.includes('canale-tv.net');
      
      if (!isEmbedPage && channel.embed.includes('.m3u8')) {
        els.video.classList.remove('hidden');
        if (Hls.isSupported()) {
          state.hls = new Hls();
          state.hls.loadSource(channel.embed);
          state.hls.attachMedia(els.video);
          state.hls.on(Hls.Events.MANIFEST_PARSED, () => {
            els.video.play().catch(e => {});
            els.playerOverlay.classList.add('hidden');
          });
        }
      } else {
        // Embed Directly - NO Referrer Meta allowed, NO Sandbox allowed
        els.iframe.classList.remove('hidden');
        els.iframe.src = channel.embed;
        setTimeout(() => els.playerOverlay.classList.add('hidden'), 2500);
      }

      els.btnPinCur.classList.toggle('active', state.pins.has(channel.name));
      els.btnFavCur.classList.toggle('active', state.favs.has(channel.name));
      updateEPG();
      clearInterval(state.epgInterval);
      state.epgInterval = setInterval(updateEPG, 60000);
      render();
      els.main.scrollTo({ top: 0, behavior: 'smooth' });
      
      // Update share slug
      const slug = channel.name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
      history.replaceState(null, '', `?ch=${encodeURIComponent(channel.name)}`);
    }

    function showFullSchedule() {
      if (!state.schedule) return;
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal-content">
          <div class="modal-header">
            <h2 style="margin:0">${state.selected.name} - Today</h2>
            <button class="action-btn" onclick="this.closest('.modal-overlay').remove()">✕ Close</button>
          </div>
          <div class="modal-body">
            ${state.schedule.map(p => {
              const isNow = p.start <= new Date() && (p.stop ? p.stop >= new Date() : true);
              return `
                <div style="padding:16px; border-radius:12px; background:${isNow ? 'rgba(var(--accent-rgb), 0.1)' : 'var(--panel-2)'}; border: 1px solid ${isNow ? 'var(--accent)' : 'var(--border)'};">
                  <div style="display:flex; gap:16px; align-items:start;">
                    <b style="color:var(--accent); min-width:60px;">${p.start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</b>
                    <div>
                      <div style="font-weight:700; color:#fff;">${p.title}</div>
                      ${p.desc ? `<div style="font-size:0.85rem; color:var(--muted); margin-top:4px;">${p.desc}</div>` : ''}
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      overlay.onclick = (e) => { if(e.target === overlay) overlay.remove(); };
    }

    function render() {
      const q = state.filters.search.toLowerCase();
      const filtered = state.all.filter(c => {
        const matchesSearch = c.name.toLowerCase().includes(q);
        const matchesCat = state.filters.category === 'all' || c.category === state.filters.category;
        const matchesCountry = state.filters.country === 'all' || c.country === state.filters.country;
        const matchesFavs = !state.filters.onlyFavs || state.favs.has(c.name);
        const matchesPins = !state.filters.onlyPins || state.pins.has(c.name);
        return matchesSearch && matchesCat && matchesCountry && matchesFavs && matchesPins;
      });

      const pinned = filtered.filter(c => state.pins.has(c.name));
      const favs = filtered.filter(c => state.favs.has(c.name) && !state.pins.has(c.name));
      const others = filtered.filter(c => !state.pins.has(c.name) && !state.favs.has(c.name));

      const drawGrid = (container, list) => {
        container.innerHTML = list.length ? list.map(c => `
          <div class="channel-card ${state.selected?.name === c.name ? 'active' : ''}" onclick="playByName('${c.name.replace(/'/g, "\\'")}')">
            <div class="card-top">
              <h3 class="card-title">${c.name}</h3>
              <span class="card-tag">${c.category.split(' ')[0]}</span>
            </div>
            <div class="card-footer">
              <span>${c.country === 'RO' ? 'Romania 🇷🇴' : (c.country || 'International')}</span>
              <div style="display:flex; gap:6px;">
                ${state.pins.has(c.name) ? '<span>📌</span>' : ''}
                ${state.favs.has(c.name) ? '<span>★</span>' : ''}
              </div>
            </div>
          </div>
        `).join('') : '<div class="empty-msg">No channels found</div>';
      };

      els.grids.sections.pinned.classList.toggle('hidden', !pinned.length);
      els.grids.sections.favs.classList.toggle('hidden', !favs.length);
      drawGrid(els.grids.pinned, pinned);
      drawGrid(els.grids.favs, favs);
      drawGrid(els.grids.explore, others);
    }

    window.playByName = (name) => {
      const c = state.all.find(x => x.name === name);
      if (c) play(c);
    };

    const M3U_URL_INTL = 'https://iptv-org.github.io/iptv/index.m3u';

    async function init() {
      state.all = userChannels.map(c => ({...c, isUser: true}));
      
      fetch(M3U_URL_INTL).then(r => r.text()).then(text => {
        const lines = text.split('\n');
        const extra = [];
        for(let i=0; i<lines.length; i++) {
          if (lines[i].startsWith('#EXTINF:')) {
            const name = lines[i].match(/,(.+)$/)?.[1]?.trim();
            const url = lines[i+1]?.trim();
            if (name && url && !url.startsWith('#')) {
              extra.push({ 
                name, embed: url, isUser: false,
                category: lines[i].match(/group-title="([^"]+)"/)?.[1] || 'External', 
                country: lines[i].match(/tvg-country="([^"]+)"/)?.[1] || 'INTL' 
              });
              i++;
            }
          }
        }
        state.all = [...state.all, ...extra];
        const cats = ['all', ...new Set(state.all.map(c => c.category))].sort();
        els.category.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
        const countries = ['all', ...new Set(state.all.map(c => c.country))].sort();
        els.country.innerHTML = countries.map(c => `<option value="${c}" ${c==='RO'?'selected':''}>${c==='all'?'All Countries':c}</option>`).join('');
        
        // Deep Link Check
        const params = new URLSearchParams(window.location.search);
        const startCh = params.get('ch');
        if (startCh) {
          const c = state.all.find(x => x.name === startCh);
          if (c) play(c);
        }
        
        render();
      });

      els.search.oninput = (e) => { state.filters.search = e.target.value; render(); };
      els.category.onchange = (e) => { state.filters.category = e.target.value; render(); };
      els.country.onchange = (e) => { state.filters.country = e.target.value; render(); };
      els.btnFavs.onclick = () => { state.filters.onlyFavs = !state.filters.onlyFavs; els.btnFavs.classList.toggle('active'); render(); };
      els.btnPins.onclick = () => { state.filters.onlyPins = !state.filters.onlyPins; els.btnPins.classList.toggle('active'); render(); };
      els.menuBtn.onclick = () => { els.sidebar.classList.add('open'); els.overlay.style.opacity = '1'; els.overlay.style.pointerEvents = 'auto'; };
      els.overlay.onclick = () => { els.sidebar.classList.remove('open'); els.overlay.style.opacity = '0'; els.overlay.style.pointerEvents = 'none'; };
      els.btnSchedule.onclick = showFullSchedule;

      els.btnPinCur.onclick = () => {
        if (!state.selected) return;
        state.pins.has(state.selected.name) ? state.pins.delete(state.selected.name) : state.pins.add(state.selected.name);
        localStorage.setItem('iptv-pins', JSON.stringify([...state.pins]));
        els.btnPinCur.classList.toggle('active', state.pins.has(state.selected.name));
        render();
      };

      els.btnFavCur.onclick = () => {
        if (!state.selected) return;
        state.favs.has(state.selected.name) ? state.favs.delete(state.selected.name) : state.favs.add(state.selected.name);
        localStorage.setItem('iptv-favs', JSON.stringify([...state.favs]));
        els.btnFavCur.classList.toggle('active', state.favs.has(state.selected.name));
        render();
      };

      els.btnShare.onclick = () => {
        const url = window.location.origin + window.location.pathname + "?ch=" + encodeURIComponent(state.selected.name);
        navigator.clipboard.writeText(url);
        const t = document.createElement('div');
        t.style = "background:var(--panel-2); color:#fff; padding:12px 24px; border-radius:12px; border:1px solid var(--border); box-shadow:var(--shadow); font-weight:600;";
        t.textContent = "Share link copied!";
        document.getElementById('toastList').appendChild(t);
        setTimeout(() => t.remove(), 3000);
      };
    }
    init();
