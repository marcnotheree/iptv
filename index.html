<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>IPTV Dark Hub - Romanian Pro</title>
  <style>
    :root {
      --bg: #07090f;
      --panel: #0f121a;
      --panel-2: #161b26;
      --text: #e1e7ff;
      --muted: #848da8;
      --accent: #5e79ff;
      --accent-rgb: 94, 121, 255;
      --success: #2ec4b6;
      --danger: #ff5c7c;
      --border: #22293d;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
      --radius: 16px;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
    }

    .sidebar-header { padding: 24px; border-bottom: 1px solid var(--border); }
    .sidebar-header h1 { 
      font-size: 1.3rem; margin: 0; font-weight: 800; 
      background: linear-gradient(to right, #fff, var(--muted)); 
      -webkit-background-clip: text; background-clip: text; 
      -webkit-text-fill-color: transparent; 
    }
    
    .controls { padding: 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; flex: 1; }
    .filter-group { display: flex; flex-direction: column; gap: 8px; }
    .filter-label { color: var(--accent); font-weight: 800; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }

    input, select {
      width: 100%; background: #0a0d14; color: var(--text); border: 1px solid var(--border);
      padding: 12px 16px; border-radius: 12px; font-size: 0.9rem; outline: none;
    }

    .toggle-btn {
      width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border);
      background: var(--panel-2); color: var(--muted); font-size: 0.85rem; font-weight: 700;
      cursor: pointer; display: flex; justify-content: space-between; align-items: center;
    }
    .toggle-btn.active { background: rgba(var(--accent-rgb), 0.1); border-color: var(--accent); color: var(--accent); }

    /* Main Area */
    .main {
      padding: 0;
      overflow-y: auto;
      background: radial-gradient(circle at 50% -20%, #1a1f35 0%, var(--bg) 70%);
      scrollbar-width: thin;
      display: flex;
      flex-direction: column;
    }

    .content-container {
      padding: 30px;
      width: 100%;
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    /* Player & EPG Row */
    #playerSection {
      display: none;
      flex-direction: column;
      gap: 20px;
      max-height: 85vh;
    }

    .player-layout {
      display: grid;
      grid-template-columns: 1.8fr 1.2fr;
      gap: 30px;
      align-items: stretch;
    }

    .player-column { display: flex; flex-direction: column; gap: 15px; min-width: 0; }
    .player-title { font-size: 1.8rem; margin: 0; font-weight: 800; color: #fff; }
    
    .video-wrapper {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    #iframePlayer { width: 100%; height: 100%; display: block; border: none; }

    .epg-container {
      background: rgba(var(--accent-rgb), 0.03);
      border-radius: 20px;
      padding: 24px;
      border: 1px solid rgba(var(--accent-rgb), 0.1);
      display: flex;
      flex-direction: column;
      gap: 20px;
      height: 100%;
    }

    .epg-current { display: flex; flex-direction: column; gap: 10px; }
    .epg-upcoming { display: flex; flex-direction: column; gap: 12px; border-top: 1px solid var(--border); padding-top: 16px; }
    
    .epg-value { color: #fff; font-weight: 700; font-size: 1.1rem; line-height: 1.4; }
    .progress-bar { height: 6px; background: #22293d; border-radius: 3px; width: 100%; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); transition: width 1s linear; }

    .upcoming-list { display: flex; flex-direction: column; gap: 12px; }
    .upcoming-item { display: grid; grid-template-columns: 65px 1fr; gap: 15px; align-items: center; font-size: 0.9rem; color: var(--muted); }
    .upcoming-time { font-weight: 800; color: var(--accent); }
    .upcoming-title { font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .action-row { display: flex; gap: 10px; margin-top: 5px; }
    .action-btn {
      padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--panel-2); color: #fff; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; gap: 8px; font-size: 0.8rem;
    }
    .action-btn.active.pin { color: var(--success); border-color: var(--success); }
    .action-btn.active.fav { color: #ffd166; border-color: #ffd166; }

    /* Grid Layout */
    .section-label { font-size: 1rem; font-weight: 800; margin: 20px 0 15px 0; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
    .channel-card {
      padding: 20px; border-radius: var(--radius); background: var(--panel-2); border: 1px solid var(--border);
      cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; gap: 12px;
    }
    .channel-card:hover { border-color: var(--accent); transform: translateY(-4px); }
    .channel-card.active { border-color: var(--accent); background: rgba(var(--accent-rgb), 0.1); }
    .card-title { font-weight: 800; font-size: 1rem; margin: 0; color: #fff; }
    .card-meta { display: flex; justify-content: space-between; align-items: center; margin-top: auto; font-size: 0.75rem; color: var(--muted); }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-content { width: 100%; max-width: 700px; max-height: 80vh; background: var(--panel); border-radius: 24px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .modal-body { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }

    #welcomeHero { padding: 80px 40px; text-align: center; }
    #welcomeHero h2 { font-size: 3rem; margin: 0; font-weight: 900; }

    .menu-btn {
      position: fixed; bottom: 24px; right: 24px; width: 60px; height: 60px; border-radius: 20px;
      background: var(--accent); color: #fff; border: none; box-shadow: 0 10px 30px rgba(var(--accent-rgb), 0.4);
      z-index: 1000; cursor: pointer; display: none; font-size: 1.2rem;
    }

    @media (max-width: 1300px) {
      .player-layout { grid-template-columns: 1fr; }
      #playerSection { max-height: none; }
    }

    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: fixed; left: 0; top: 0; width: 300px; height: 100vh; transform: translateX(-100%); background: var(--panel); }
      .sidebar.open { transform: translateX(0); }
      .menu-btn { display: flex; align-items: center; justify-content: center; }
      .channel-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    }
  </style>
</head>

      { name: "KISS TV", embed: "https://canale-tv.net/channel/kisstv.html", category: "Music", country: "RO" },
      { name: "MUSIC CHANNEL", embed: "https://canale-tv.net/channel/musicch.html", category: "Music", country: "RO" },
      { name: "ZU TV", embed: "https://canale-tv.net/channel/zutv.html", category: "Music", country: "RO" },
      { name: "Fish & Hunting TV", embed: "https://canale-tv.net/channel/fishy.html", category: "Lifestyle", country: "RO" },
      { name: "F1lm B0X", embed: "https://canale-tv.net/channel/fbox1.html", category: "Movies", country: "RO" },
      { name: "F1lm B0X Extra", embed: "https://canale-tv.net/channel/fbox-extra.html", category: "Movies", country: "RO" },
      { name: "F1lm B0X Premium", embed: "https://canale-tv.net/channel/fbox-premium.html", category: "Movies", country: "RO" },
      { name: "Canal 33", embed: "https://canale-tv.net/channel/canal-33.html", category: "News", country: "RO" },
      { name: "Dizi", embed: "https://canale-tv.net/channel/dizy.html", category: "Entertainment", country: "RO" }
    ];

    const state = {
      all: [...userChannels],
      favs: new Set(JSON.parse(localStorage.getItem('iptv-favs') || '[]')),
      pins: new Set(JSON.parse(localStorage.getItem('iptv-pins') || '[]')),
      filters: { search: '', category: 'all', onlyFavs: false, onlyPins: false },
      selected: null,
      epgInterval: null,
      schedule: null
    };

    const els = {
      sidebar: document.getElementById('sidebar'),
      overlay: document.getElementById('drawerOverlay'),
      menuBtn: document.getElementById('menuBtn'),
      main: document.getElementById('mainScroll'),
      playerSection: document.getElementById('playerSection'),
      welcomeHero: document.getElementById('welcomeHero'),
      search: document.getElementById('searchInput'),
      category: document.getElementById('categorySelect'),
      btnFavs: document.getElementById('toggleFavs'),
      btnPins: document.getElementById('togglePins'),
      iframe: document.getElementById('iframePlayer'),
      playerTitle: document.getElementById('playerTitle'),
      epgBox: document.getElementById('epgBox'),
      epgNow: document.getElementById('epgNow'),
      epgUpcoming: document.getElementById('epgUpcomingList'),
      epgProgress: document.getElementById('epgProgress'),
      btnPinCur: document.getElementById('btnPin'),
      btnFavCur: document.getElementById('btnFav'),
      btnSchedule: document.getElementById('btnSchedule'),
      btnShare: document.getElementById('btnShare'),
      grids: {
        pinned: document.getElementById('pinnedGrid'),
        favs: document.getElementById('favGrid'),
        explore: document.getElementById('exploreGrid'),
        sections: { pinned: document.getElementById('pinnedSec'), favs: document.getElementById('favSec') }
      }
    };

    const ALL_ORIGINS = 'https://api.allorigins.win/get?url=';
    const CINEMAGIA_MAP = {
      "PROTV HD": "pro-tv", "A1 HD": "antena-1", "TVR1": "tvr-1", "TVR2": "tvr-2", "CANAL D": "kanal-d", "CANAL D2": "kanal-d2", "PRIMA TV": "prima-tv", "NATIONAL TV": "national-tv", "TVR 3": "tvr-3", "PROCINEMA": "pro-cinema", "ACASA TV": "acasa", "ACASA GOLD": "acasa-gold", "ANTENA STARS": "antena-stars", "ROMANIA TV": "romania-tv", "REALITATEA TV": "realitatea-plus", "B1 TV": "b1-tv", "NEWS24": "digi-24", "ZU TV": "zu-tv", "KISS TV": "kiss-tv", "UTV": "u-tv", "SUPERSPORT 1": "digi-sport-1", "SUPERSPORT 2": "digi-sport-2", "SUPERSPORT 3": "digi-sport-3", "SUPERSPORT 4": "digi-sport-4", "PRO ARENA": "pro-arena", "TVR SPORT": "tvr-sport", "PRIMA SPORT 1": "prima-sport-1", "PRIMA SPORT 2": "prima-sport-2", "PRIMA SPORT 3": "prima-sport-3", "PRIMA SPORT 4": "prima-sport-4", "PRIMA SPORT 5": "prima-sport-5", "HB0": "hbo", "HB0 2": "hbo-2", "HB0 3": "hbo-3", "DIVA": "diva", "HAPPY TV": "happy-channel", "FILM CAFE": "film-cafe", "TV 1000": "tv-1000", "FlLM N0W": "film-now", "EPIC DRAMA": "epic-drama", "AMC": "amc", "BBC NEWS": "bbc-news", "CNN": "cnn", "CBS REALITY": "cbs-reality", "BBC FIRST": "bbc-first", "BOLYWOOD TV": "bollywood-film", "COMEDY CENTRAL": "comedy-central", "WARNER TV": "warner-tv"
    };

    async function fetchCinemagia(channel) {
      const slug = CINEMAGIA_MAP[channel.name];
      if (!slug) return null;
      try {
        const url = `https://www.cinemagia.ro/program-tv/post/${slug}/`;
        const res = await fetch(ALL_ORIGINS + encodeURIComponent(url));
        const data = await res.json();
        const doc = new DOMParser().parseFromString(data.contents, 'text/html');
        const roDate = new Intl.DateTimeFormat('en-CA', {timeZone:'Europe/Bucharest'}).format(new Date());
        const logoCells = Array.from(doc.querySelectorAll('td.container_logo'));
        
        let colIdx = logoCells.findIndex(td => td.getAttribute('data-iso-date') === roDate);
        if (colIdx === -1) {
           const daysRo = ["Duminică", "Luni", "Marți", "Miercuri", "Joi", "Vineri", "Sâmbătă"];
           const dayName = daysRo[new Date(new Date().toLocaleString("en-US", {timeZone: "Europe/Bucharest"})).getDay()];
           colIdx = logoCells.findIndex(td => td.textContent.includes(dayName));
        }
        colIdx = colIdx % 7;
        if (colIdx < 0) colIdx = 0;

        const eventCells = Array.from(doc.querySelectorAll('td.container_events'));
        const schedule = [];
        const baseDate = new Date(new Date().toLocaleString("en-US", {timeZone: "Europe/Bucharest"}));
        baseDate.setHours(0,0,0,0);
        
        for (let i = colIdx; i < eventCells.length; i += 7) {
          const cell = eventCells[i];
          if (!cell) continue;
          cell.querySelectorAll('table.events tr').forEach(row => {
            const time = row.querySelector('td.ora div')?.textContent?.trim();
            const title = row.querySelector('.title')?.textContent?.trim();
            if (time && title) {
              const [h, m] = time.split(':').map(Number);
              const start = new Date(baseDate);
              start.setHours(h, m, 0, 0);
              if (schedule.length > 0 && start < schedule[schedule.length-1].start) {
                 const nextDay = new Date(start);
                 nextDay.setDate(nextDay.getDate() + 1);
                 schedule.push({ start: nextDay, title, desc: row.querySelector('.info')?.textContent?.trim() || "" });
              } else {
                 schedule.push({ start, title, desc: row.querySelector('.info')?.textContent?.trim() || "" });
              }
            }
          });
        }
        return schedule.sort((a,b) => a.start - b.start);
      } catch(e) { return null; }
    }

    async function updateEPG() {
      if (!state.selected) return;
      const roNow = new Date(new Date().toLocaleString("en-US", {timeZone: "Europe/Bucharest"}));
      const schedule = await fetchCinemagia(state.selected);
      if (schedule && schedule.length > 0) {
        state.schedule = schedule;
        els.epgBox.classList.remove('hidden');
        const current = schedule.find((p, i) => {
          const next = schedule[i+1];
          return p.start <= roNow && (!next || next.start > roNow);
        });
        const upcoming = schedule.filter(p => p.start > roNow).slice(0, 3);
        if (current) {
          const nextStart = upcoming[0]?.start || new Date(current.start.getTime() + 2*3600000);
          const progress = Math.min(100, Math.max(0, ((roNow - current.start) / (nextStart - current.start)) * 100));
          els.epgNow.textContent = current.title;
          els.epgProgress.style.width = progress + '%';
        }
        els.epgUpcoming.innerHTML = upcoming.map(p => `
          <div class="upcoming-item">
            <span class="upcoming-time">${p.start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
            <span class="upcoming-title">${p.title}</span>
          </div>
        `).join('') || '<div class="empty-msg">End of schedule</div>';
      } else {
        els.epgNow.textContent = "Schedule not available";
        els.epgUpcoming.innerHTML = "";
        els.epgProgress.style.width = '0%';
      }
    }

    function play(channel) {
      state.selected = channel;
      els.welcomeHero.style.display = 'none';
      els.playerSection.style.display = 'flex';
      els.playerTitle.textContent = channel.name;
      
      // PURE EMBED: NO sandbox, NO controls restrictions, NO overlay
      els.iframe.src = channel.embed;

      els.btnPinCur.classList.toggle('active', state.pins.has(channel.name));
      els.btnFavCur.classList.toggle('active', state.favs.has(channel.name));
      updateEPG();
      clearInterval(state.epgInterval);
      state.epgInterval = setInterval(updateEPG, 60000);
      render();
      els.main.scrollTo({ top: 0, behavior: 'smooth' });
      history.replaceState(null, '', `?ch=${encodeURIComponent(channel.name)}`);
    }

    function showFullSchedule() {
      if (!state.schedule) return;
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `<div class="modal-content"><div class="modal-header"><h2 style="margin:0; color:#fff;">${state.selected.name}</h2><button class="action-btn" onclick="this.closest('.modal-overlay').remove()">✕ Close</button></div><div class="modal-body">` + 
        state.schedule.map(p => `
          <div style="padding:16px; border-radius:12px; background:var(--panel-2); border: 1px solid var(--border);">
            <div style="display:flex; gap:16px;">
              <b style="color:var(--accent); min-width:60px;">${p.start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</b>
              <div><div style="font-weight:700; color:#fff;">${p.title}</div><div style="font-size:0.85rem; color:var(--muted);">${p.desc}</div></div>
            </div>
          </div>`).join('') + `</div></div>`;
      document.body.appendChild(overlay);
      overlay.onclick = (e) => { if(e.target === overlay) overlay.remove(); };
    }

    function render() {
      const q = state.filters.search.toLowerCase();
      const filtered = state.all.filter(c => {
        const matchesSearch = c.name.toLowerCase().includes(q);
        const matchesCat = state.filters.category === 'all' || c.category === state.filters.category;
        const matchesFavs = !state.filters.onlyFavs || state.favs.has(c.name);
        const matchesPins = !state.filters.onlyPins || state.pins.has(c.name);
        return matchesSearch && matchesCat && matchesFavs && matchesPins;
      });

      const pinned = filtered.filter(c => state.pins.has(c.name));
      const favs = filtered.filter(c => state.favs.has(c.name) && !state.pins.has(c.name));
      const others = filtered.filter(c => !state.pins.has(c.name) && !state.favs.has(c.name));

      const drawGrid = (container, list) => {
        container.innerHTML = list.map(c => `
          <div class="channel-card ${state.selected?.name === c.name ? 'active' : ''}" onclick="playByName('${c.name.replace(/'/g, "\\'")}')">
            <h3 class="card-title">${c.name}</h3>
            <div class="card-meta"><span>${c.category}</span><div style="display:flex; gap:6px;">${state.pins.has(c.name)?'📌':''}${state.favs.has(c.name)?'★':''}</div></div>
          </div>`).join('') || '<div class="empty-msg">No channels found</div>';
      };

      els.grids.sections.pinned.classList.toggle('hidden', !pinned.length);
      els.grids.sections.favs.classList.toggle('hidden', !favs.length);
      drawGrid(els.grids.pinned, pinned); drawGrid(els.grids.favs, favs); drawGrid(els.grids.explore, others);
    }

    window.playByName = (n) => { const c = state.all.find(x => x.name === n); if (c) play(c); };

    function init() {
      const cats = ['all', ...new Set(state.all.map(c => c.category))].sort();
      els.category.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
      
      const startCh = new URLSearchParams(window.location.search).get('ch');
      if (startCh) { const c = state.all.find(x => x.name === startCh); if (c) play(c); }
      
      render();
      els.search.oninput = (e) => { state.filters.search = e.target.value; render(); };
      els.category.onchange = (e) => { state.filters.category = e.target.value; render(); };
      els.btnFavs.onclick = () => { state.filters.onlyFavs = !state.filters.onlyFavs; els.btnFavs.classList.toggle('active'); render(); };
      els.btnPins.onclick = () => { state.filters.onlyPins = !state.filters.onlyPins; els.btnPins.classList.toggle('active'); render(); };
      els.menuBtn.onclick = () => { els.sidebar.classList.add('open'); els.overlay.style.opacity = '1'; els.overlay.style.pointerEvents = 'auto'; };
      els.overlay.onclick = () => { els.sidebar.classList.remove('open'); els.overlay.style.opacity = '0'; els.overlay.style.pointerEvents = 'none'; };
      els.btnSchedule.onclick = showFullSchedule;
      els.btnPinCur.onclick = () => { if(!state.selected) return; state.pins.has(state.selected.name) ? state.pins.delete(state.selected.name) : state.pins.add(state.selected.name); localStorage.setItem('iptv-pins', JSON.stringify([...state.pins])); render(); };
      els.btnFavCur.onclick = () => { if(!state.selected) return; state.favs.has(state.selected.name) ? state.favs.delete(state.selected.name) : state.favs.add(state.selected.name); localStorage.setItem('iptv-favs', JSON.stringify([...state.favs])); render(); };
      els.btnShare.onclick = () => { const url = window.location.origin + window.location.pathname + "?ch=" + encodeURIComponent(state.selected.name); navigator.clipboard.writeText(url); alert("Link copied!"); };
    }
    init();
  </script>
</body>
</html>
