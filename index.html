<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>IPTV Dark Hub - Pro Streamer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
  <style>
    :root {
      --bg: #07090f;
      --panel: #0f121a;
      --panel-2: #161b26;
      --text: #e1e7ff;
      --muted: #848da8;
      --accent: #5e79ff;
      --accent-rgb: 94, 121, 255;
      --success: #2ec4b6;
      --danger: #ff5c7c;
      --border: #22293d;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
      --radius: 14px;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: 380px 1fr;
      height: 100vh;
    }

    /* Sidebar / Desktop */
    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
      height: 100vh;
      overflow: hidden;
      transition: var(--transition);
    }

    .sidebar-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-header h1 { font-size: 1.4rem; margin: 0; font-weight: 800; background: linear-gradient(to right, #fff, var(--muted)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .controls { padding: 20px; display: flex; flex-direction: column; gap: 12px; background: rgba(0,0,0,0.2); flex-shrink: 0; }
    
    input, select {
      width: 100%;
      background: #0a0d14;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.95rem;
      outline: none;
      transition: var(--transition);
    }

    input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(var(--accent-rgb), 0.15); }

    .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .toggle-group { display: flex; gap: 8px; }
    .btn-toggle {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-toggle.active { background: rgba(var(--accent-rgb), 0.1); border-color: var(--accent); color: var(--accent); }

    .channel-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .channel-card {
      padding: 14px;
      border-radius: var(--radius);
      background: var(--panel-2);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: var(--transition);
      flex-shrink: 0;
    }
    .channel-card:hover { border-color: #3b4568; transform: translateY(-2px); }
    .channel-card.active { border-color: var(--accent); background: rgba(var(--accent-rgb), 0.05); }
    
    .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .card-name { font-weight: 700; font-size: 1rem; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-tag { font-size: 0.65rem; padding: 3px 8px; border-radius: 6px; background: #1e2538; color: #a5b4fc; border: 1px solid #2d3755; text-transform: uppercase; }
    
    .card-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: var(--muted); }

    /* Main Content */
    .main {
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
      background: radial-gradient(circle at 50% -20%, #1a1f35 0%, var(--bg) 70%);
    }

    .player-container {
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Player Header & EPG */
    .player-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; }
    .info-group { flex: 1; }
    .title-row { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
    .player-title { font-size: 1.8rem; margin: 0; font-weight: 800; }
    
    .epg-container {
      background: rgba(var(--accent-rgb), 0.05);
      border-radius: 12px;
      padding: 14px 18px;
      margin-top: 12px;
      border: 1px solid rgba(var(--accent-rgb), 0.1);
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 80px;
    }

    .epg-row { display: flex; align-items: center; gap: 12px; font-size: 0.9rem; }
    .epg-label { color: var(--accent); font-weight: 700; min-width: 50px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .epg-value { color: var(--text); font-weight: 500; }
    .epg-next { color: var(--muted); font-size: 0.85rem; }

    .progress-bar { height: 4px; background: #22293d; border-radius: 2px; width: 100%; overflow: hidden; margin-top: 4px; }
    .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 1s linear; }

    .actions { display: flex; gap: 10px; }
    .btn-action {
      padding: 12px 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: var(--transition);
    }
    .btn-action:hover { background: #1e2538; }
    .btn-action.active.pin { border-color: var(--success); color: var(--success); }
    .btn-action.active.fav { border-color: #ffd166; color: #ffd166; }

    /* Video Frame */
    .video-wrapper {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    #videoPlayer, #iframePlayer { width: 100%; height: 100%; display: block; border: none; }

    /* Overlays */
    .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 10; gap: 15px; }
    .spinner { width: 44px; height: 44px; border: 4px solid rgba(var(--accent-rgb), 0.1); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }

    /* Mobile Navigation */
    .mobile-nav {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      z-index: 1000;
      background: var(--accent);
      color: #fff;
      padding: 14px 28px;
      border-radius: 100px;
      font-weight: 700;
      box-shadow: 0 8px 30px rgba(var(--accent-rgb), 0.4);
      border: none;
      cursor: pointer;
    }

    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: auto; }

    /* Toasts */
    .toast-list { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 10px; z-index: 2000; }
    .toast { background: var(--panel-2); border: 1px solid var(--border); padding: 14px 24px; border-radius: 12px; font-size: 0.9rem; animation: slideUp 0.3s ease forwards; box-shadow: var(--shadow); }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* Mobile Specific */
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 75vh;
        border-right: none;
        border-top: 1px solid var(--border);
        border-radius: 24px 24px 0 0;
        transform: translateY(100%);
        box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        z-index: 1001;
      }
      .sidebar.open { transform: translateY(0); }
      .main { padding: 16px; padding-bottom: 100px; }
      .mobile-nav { display: block; }
      .player-header { flex-direction: column; gap: 16px; }
      .actions { width: 100%; }
      .btn-action { flex: 1; justify-content: center; }
      .player-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="drawerOverlay" class="drawer-overlay"></div>
    
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>IPTV Dark Hub</h1>
      </div>

      <section class="controls">
        <input id="searchInput" placeholder="Search channels..." autocomplete="off" />
        <div class="filter-grid">

            <option value="all">Countries</option>
          </select>
        </div>
        <div class="toggle-group">
          <button id="showFavorites" class="btn-toggle">★ Favorites</button>

        </div>
      </section>

      <section class="channel-list" id="channelList"></section>
    </aside>

    <main class="main">
      <div class="player-container">
        <div class="player-header">
          <div class="info-group">

            </div>
            <div id="epgBox" class="epg-container hidden">

            </div>
          </div>

            <button id="pinCurrent" class="btn-action pin">📌 <span>Pin</span></button>
            <button id="favoriteCurrent" class="btn-action fav">★ <span>Fav</span></button>
            <button id="copyCurrentLink" class="btn-action">🔗 <span>Share</span></button>
          </div>
        </div>

        <div class="video-wrapper">
          <video id="videoPlayer" controls playsinline class="hidden"></video>
          <iframe id="iframePlayer" allow="autoplay; fullscreen" class="hidden"></iframe>
          
          <div id="playerOverlay" class="overlay">
            <div class="spinner"></div>
            <p id="overlayText">Waiting for signal...</p>
          </div>

          <div id="playerError" class="overlay hidden">
            <p style="color: var(--danger); font-weight: 700;">Connection Failed</p>
            <button onclick="location.reload()" class="btn-action" style="margin-top: 10px;">Retry</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="channels.js"></script>

     */

    const state = {

      favs: new Set(JSON.parse(localStorage.getItem('iptv-favorites') || '[]')),

    // --- Country Enrichment Engine ---

    const COUNTRY_MAP = {
      '.ro/': 'RO', '.ro.': 'RO', 'romania': 'RO', '(ro)': 'RO', '[ro]': 'RO', 'tvr ': 'RO',
      '.it/': 'IT', '.it.': 'IT', 'italy': 'IT', 'italia': 'IT', '(it)': 'IT',
      '.fr/': 'FR', '.fr.': 'FR', 'france': 'FR', '(fr)': 'FR',
      '.de/': 'DE', '.de.': 'DE', 'germany': 'DE', 'deutschland': 'DE', '(de)': 'DE',
      '.es/': 'ES', '.es.': 'ES', 'spain': 'ES', 'espana': 'ES', '(es)': 'ES',
      '.uk/': 'UK', '.uk.': 'UK', 'united kingdom': 'UK', ' bbc ': 'UK', '(uk)': 'UK',
      '.us/': 'US', '.us.': 'US', 'usa ': 'US', 'united states': 'US', '(us)': 'US',
      '.tr/': 'TR', '.tr.': 'TR', 'turkey': 'TR', 'turkiye': 'TR', '(tr)': 'TR',
      '.br/': 'BR', '.br.': 'BR', 'brazil': 'BR', 'brasil': 'BR', '(br)': 'BR',
      'canale-tv.net': 'RO'
    };

    function enrichChannel(c) {
      if (c.country && c.country !== 'Undefined') return c;
      const nameLower = c.name.toLowerCase();
      const urlLower = c.embed.toLowerCase();
      for (const [pattern, code] of Object.entries(COUNTRY_MAP)) {
        if (nameLower.includes(pattern) || urlLower.includes(pattern)) {
          c.country = code;
          return c;
        }
      }
      c.country = 'INTL';
      return c;
    }

    const COUNTRY_NAMES = {
      'RO': 'Romania 🇷🇴', 'IT': 'Italy 🇮🇹', 'FR': 'France 🇫🇷', 'DE': 'Germany 🇩🇪', 'ES': 'Spain 🇪🇸',
      'UK': 'United Kingdom 🇬🇧', 'US': 'United States 🇺🇸', 'TR': 'Turkey 🇹🇷', 'BR': 'Brazil 🇧🇷',
      'RU': 'Russia 🇷🇺', 'NL': 'Netherlands 🇳🇱', 'MA': 'Morocco 🇲🇦', 'GE': 'Georgia 🇬🇪',
      'ZA': 'South Africa 🇿🇦', 'INTL': 'International / Other 🌍'

    // --- Accurate EPG Engine ---

    let roEpgData = null;

    const CINEMAGIA_MAP = {

    };

    async function fetchCinemagiaSchedule(channelName) {
      const slug = CINEMAGIA_MAP[channelName];
      if (!slug) return null;

      try {
        const url = `https://m.cinemagia.ro/program-tv/${slug}/`;
        const response = await fetch(PROXY + encodeURIComponent(url));
        if (!response.ok) return null;
        const html = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        
        const items = doc.querySelectorAll('li.program-item');
        const schedule = [];
        const now = new Date();
        
        items.forEach((item) => {
          const timeStr = item.querySelector('.program-time')?.textContent?.trim();
          if (!timeStr) return;
          
          const [h, m] = timeStr.split(':').map(Number);
          const start = new Date(now);
          start.setHours(h, m, 0, 0);
          
          // Detect day rollover
          if (schedule.length > 0 && start < schedule[schedule.length - 1].start) {
             start.setDate(start.getDate() + 1);
          }
          
          const title = item.querySelector('.program-title')?.textContent?.trim();
          const desc = item.querySelector('.program-description')?.textContent?.trim() || "";
          const metadata = item.querySelector('.program-metadata')?.textContent?.trim() || "";
          
          schedule.push({ start, title, desc, metadata });
        });
        
        // Set stop times
        for (let i = 0; i < schedule.length - 1; i++) {
          schedule[i].stop = schedule[i+1].start;
        }
        if (schedule.length > 0) {
          const last = schedule[schedule.length - 1];
          last.stop = new Date(last.start.getTime() + 2 * 60 * 60 * 1000);
        }
        
        return schedule;
      } catch (e) {
        console.error("Cinemagia fetch error", e);
        return null;
      }
    }

    async function fetchRoEPG() {
      if (roEpgData) return roEpgData;
      try {
        const response = await fetch(RO_EPG_URL);
        const text = await response.text();
        const parser = new DOMParser();
        roEpgData = parser.parseFromString(text, "text/xml");
        return roEpgData;
      } catch (e) {
        console.error("Failed to fetch RO EPG", e);
        return null;
      }
    }

    function parseXmlTime(timeStr) {
      // Format: 20260310100000 +0200
      const Y = timeStr.substring(0, 4);
      const M = timeStr.substring(4, 6) - 1;
      const D = timeStr.substring(6, 8);
      const h = timeStr.substring(8, 10);
      const m = timeStr.substring(10, 12);
      const s = timeStr.substring(12, 14);
      return new Date(Y, M, D, h, m, s);
    }

    async function getRoChannelSchedule(channelName) {
      const xml = await fetchRoEPG();
      if (!xml) return null;

      const cleanName = channelName.replace(/(HD|SD|4K|1080p|720p|RO|\[.*\]|\(.*\))/gi, '').trim().toLowerCase();
      
      // Try to find channel ID first
      const channels = xml.querySelectorAll('channel');
      let channelId = null;
      for (const ch of channels) {
        const displayName = ch.querySelector('display-name')?.textContent?.toLowerCase();
        if (displayName && (displayName.includes(cleanName) || cleanName.includes(displayName))) {
          channelId = ch.getAttribute('id');
          break;
        }
      }

      if (!channelId) return null;

      const programs = xml.querySelectorAll(`programme[channel="${channelId}"]`);
      const schedule = [];
      const now = new Date();
      const todayStr = now.toISOString().split('T')[0].replace(/-/g, '');

      programs.forEach(p => {
        const start = parseXmlTime(p.getAttribute('start'));
        const stop = parseXmlTime(p.getAttribute('stop'));
        const title = p.querySelector('title')?.textContent;
        const desc = p.querySelector('desc')?.textContent || '';

        // Only today's programs
        if (start.toISOString().split('T')[0] === now.toISOString().split('T')[0]) {
          schedule.push({ start, stop, title, desc });
        }
      });

      return schedule.sort((a, b) => a.start - b.start);
    }

    async function fetchEPG(channel) {
      const name = channel.name;
      const isRomanian = channel.country === 'RO' || channel.category === 'Canale TV ROMANIA Embed';

      if (isRomanian) {
        const schedule = await fetchCinemagiaSchedule(name);
        if (schedule && schedule.length > 0) {
          const now = new Date();
          const current = schedule.find(p => p.start <= now && p.stop >= now);
          const next = schedule.find(p => p.start > now);
          
          if (current) {
            return {
              now: current.title,
              next: next ? next.title : "End of broadcast",
              progress: Math.min(100, Math.max(0, ((now - current.start) / (current.stop - current.start)) * 100)),
              fullSchedule: schedule,
              source: 'Cinemagia'
            };
          }
        }
        
        // Fallback to XMLTV if Cinemagia fails
        const xmlSchedule = await getRoChannelSchedule(name);
        if (xmlSchedule && xmlSchedule.length > 0) {
          const now = new Date();
          const current = xmlSchedule.find(p => p.start <= now && p.stop >= now);
          const next = xmlSchedule.find(p => p.start > now);
          if (current) {
            return {
              now: current.title,
              next: next ? next.title : "End of broadcast",
              progress: Math.min(100, Math.max(0, ((now - current.start) / (current.stop - current.start)) * 100)),
              fullSchedule: xmlSchedule,
              source: 'XMLTV'
            };
          }
        }
      }

      try {
        const cleanName = name.replace(/(HD|SD|4K|1080p|720p|RO|UK|US|FR|IT|DE|ES|BR|TR|\[.*\]|\(.*\))/gi, '').trim();
        const response = await fetch(`https://api.tvmaze.com/singlesearch/shows?q=${encodeURIComponent(cleanName)}&embed=episodes`);
        if (!response.ok) throw new Error('Not found');
        const data = await response.json();
        return {
          now: data.name,
          next: "Check local listings for specific timing",
          progress: 50,
          source: 'TVMaze Verified'
        };
      } catch (e) {
        return null;
      }
    }

    async function updateEPG() {
      if (!state.selected) return;
      els.epgBox.classList.remove('hidden');
      els.epgNow.textContent = "Updating program data...";
      els.epgNext.textContent = "Verifying schedule...";
      
      const data = await fetchEPG(state.selected);
      
      if (data) {
        els.epgNow.textContent = data.now;
        els.epgNext.textContent = data.next;
        els.epgProgress.style.width = data.progress + '%';
        state.currentSchedule = data.fullSchedule || null;
        if (state.currentSchedule) {
           els.epgNow.style.cursor = 'pointer';
           els.epgNow.title = `Source: ${data.source}. Click for full day schedule`;
           els.epgNow.onclick = showFullDaySchedule;
           els.btnShowSchedule.classList.remove('hidden');
        } else {
           els.epgNow.style.cursor = 'default';
           els.epgNow.onclick = null;
           els.btnShowSchedule.classList.add('hidden');
        }
      } else {
        els.epgNow.textContent = "Program information unavailable";
        els.epgNext.textContent = "No schedule found for this channel";
        els.epgProgress.style.width = '0%';
        state.currentSchedule = null;
        els.btnShowSchedule.classList.add('hidden');
      }
    }

    function showFullDaySchedule() {
      if (!state.currentSchedule) return;
      
      const modal = document.createElement('div');
      modal.className = 'overlay';
      modal.style.zIndex = '2000';
      modal.style.background = 'rgba(0,0,0,0.95)';
      modal.style.overflowY = 'auto';
      modal.style.padding = '20px 10px';
      
      const content = document.createElement('div');
      content.className = 'player-container';
      content.style.maxWidth = '800px';
      content.style.margin = '0 auto';
      content.style.padding = '24px';
      content.style.background = 'var(--panel)';
      content.style.borderRadius = '24px';
      content.style.border = '1px solid var(--border)';
      content.style.boxShadow = 'var(--shadow)';
      
      content.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; position:sticky; top:0; background:var(--panel); padding:10px 0; border-bottom:1px solid var(--border); z-index:1;">
          <h2 style="margin:0; font-size:1.4rem;">${state.selected.name} Schedule</h2>
          <button class="btn-action" id="closeSchedule" style="padding: 8px 16px;">✕ Close</button>
        </div>
        <div style="display:flex; flex-direction:column; gap:12px;">
          ${state.currentSchedule.map(p => {
            const isNow = p.start <= new Date() && p.stop >= new Date();
            return `
              <div style="padding:16px; border-radius:16px; background:${isNow ? 'rgba(var(--accent-rgb), 0.1)' : 'var(--panel-2)'}; border: 1px solid ${isNow ? 'var(--accent)' : 'var(--border)'}; transition: var(--transition);">
                <div style="display:flex; gap:20px; align-items:flex-start;">
                  <span style="color:${isNow ? 'var(--accent)' : 'var(--muted)'}; font-weight:800; min-width:80px; font-size:0.9rem; font-variant-numeric: tabular-nums;">
                    ${p.start.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                  </span>
                  <div style="flex:1;">
                    <div style="font-weight:700; font-size:1.1rem; color: ${isNow ? '#fff' : 'var(--text)'};">${p.title}</div>
                    ${p.metadata ? `<div style="font-size:0.75rem; color:var(--accent); text-transform:uppercase; letter-spacing:0.5px; margin-top:4px; font-weight:700;">${p.metadata}</div>` : ''}
                    ${p.desc ? `<div style="font-size:0.9rem; color:var(--muted); margin-top:8px; line-height:1.5;">${p.desc}</div>` : ''}
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `;
      
      modal.appendChild(content);
      document.body.appendChild(modal);
      
      document.getElementById('closeSchedule').onclick = () => modal.remove();
      modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
    }

    // --- Core UI Logic ---

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      els.toasts.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    function toggleDrawer(force) {
      const isOpen = force !== undefined ? force : !els.sidebar.classList.contains('open');
      els.sidebar.classList.toggle('open', isOpen);
      els.drawerOverlay.classList.toggle('open', isOpen);
    }

    els.mobileBrowse.onclick = () => toggleDrawer(true);
    els.drawerOverlay.onclick = () => toggleDrawer(false);

    function play(channel) {
      state.selected = channel;
      if (state.hls) { state.hls.destroy(); state.hls = null; }
      els.video.pause();
      els.video.classList.add('hidden');
      els.iframe.classList.add('hidden');
      els.error.classList.add('hidden');
      els.overlay.classList.remove('hidden');
      els.overlayText.textContent = `Connecting to ${channel.name}...`;
      els.title.textContent = channel.name;
      els.btnPinCur.classList.toggle('active', state.pins.has(channel.name));
      els.btnFavCur.classList.toggle('active', state.favs.has(channel.name));

      // RULE: Romanian Embeds MUST use Iframe
      const isRomanianEmbed = channel.category === "Canale TV ROMANIA Embed";
      const isHLS = channel.embed.includes('.m3u8') && !isRomanianEmbed;

      if (isHLS) {
        els.video.classList.remove('hidden');
        if (Hls.isSupported()) {
          state.hls = new Hls({ capLevelToPlayerSize: true });
          state.hls.loadSource(channel.embed);
          state.hls.attachMedia(els.video);
          state.hls.on(Hls.Events.MANIFEST_PARSED, () => els.video.play().catch(() => {}));
          state.hls.on(Hls.Events.ERROR, (e, d) => d.fatal && els.error.classList.remove('hidden'));
        } else {
          els.video.src = channel.embed;
          els.video.play().catch(() => {});
        }
      } else {
        // Use Iframe for Romanian embeds or other non-M3U8 links
        els.iframe.classList.remove('hidden');
        els.iframe.src = channel.embed;
      }

      els.video.onplaying = () => els.overlay.classList.add('hidden');
      if (!isHLS) setTimeout(() => els.overlay.classList.add('hidden'), 2500);

      updateEPG();
      clearInterval(state.epgInterval);
      state.epgInterval = setInterval(updateEPG, 300000); // Refresh every 5 mins
      
      const slug = channel.name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
      history.replaceState(null, '', `#channel=${slug}`);
      toggleDrawer(false);
      render();
    }

    function render() {
      const q = state.filters.search.toLowerCase();
      state.filtered = state.channels.filter(c => {
        const matchQ = c.name.toLowerCase().includes(q);
        const matchCat = state.filters.category === 'all' || c.category === state.filters.category;
        const matchCtry = state.filters.country === 'all' || c.country === state.filters.country;
        const matchFav = !state.filters.favs || state.favs.has(c.name);
        const matchPin = !state.filters.pins || state.pins.has(c.name);
        return matchQ && matchCat && matchCtry && matchFav && matchPin;
      }).sort((a, b) => {
        if (state.pins.has(a.name) !== state.pins.has(b.name)) return state.pins.has(b.name) ? 1 : -1;
        if (state.favs.has(a.name) !== state.favs.has(b.name)) return state.favs.has(b.name) ? 1 : -1;
        return a.name.localeCompare(b.name);
      });

      els.list.innerHTML = '';
      state.filtered.slice(0, 1000).forEach(c => {
        const active = state.selected && state.selected.name === c.name;
        const card = document.createElement('div');
        card.className = `channel-card ${active ? 'active' : ''}`;
        card.innerHTML = `
          <div class="card-top">
            <h3 class="card-name">${c.name}</h3>
            <span class="card-tag">${c.category}</span>
          </div>
          <div class="card-meta">
            <span>${COUNTRY_NAMES[c.country] || c.country || 'International 🌍'}</span>
            <div class="actions" style="gap:4px">
              <span class="pin-icon" style="color:${state.pins.has(c.name) ? 'var(--success)' : 'var(--muted)'}">📌</span>
              <span class="fav-icon" style="color:${state.favs.has(c.name) ? '#ffd166' : 'var(--muted)'}">★</span>
            </div>
          </div>
        `;
        card.onclick = () => play(c);
        els.list.appendChild(card);
      });
    }

    function initFilters() {
      const cats = ['all', ...new Set(state.channels.map(c => c.category))].sort();
      els.category.innerHTML = cats.map(c => `<option value="${c}">${c === 'all' ? 'All Categories' : c}</option>`).join('');
      const ctrs = ['all', ...new Set(state.channels.map(c => c.country))].sort((a,b) => {
        if (a === 'INTL') return 1; if (b === 'INTL') return -1;
        return a.localeCompare(b);
      });
      els.country.innerHTML = ctrs.map(c => `<option value="${c}">${c === 'all' ? 'All Countries' : (COUNTRY_NAMES[c] || c)}</option>`).join('');
    }

    async function init() {
      state.channels = channels.map(enrichChannel);
      fetch(M3U_URL).then(r => r.text()).then(text => {
        const lines = text.split('\n');
        const extra = [];
        for(let i=0; i<lines.length; i++) {
          if (lines[i].startsWith('#EXTINF:')) {
            const name = lines[i].match(/,(.+)$/)?.[1]?.trim();
            const url = lines[i+1]?.trim();
            const countryMatch = lines[i].match(/tvg-country="([^"]+)"/);
            if (name && url && !url.startsWith('#')) {
              extra.push(enrichChannel({ 
                name, 
                embed: url, 
                category: lines[i].match(/group-title="([^"]+)"/)?.[1] || 'External', 
                country: countryMatch ? countryMatch[1] : '' 
              }));
              i++;
            }
          }
        }
        state.channels = [...state.channels, ...extra];
        initFilters();
        render();
        showToast(`Loaded ${state.channels.length} channels.`);
      });
      initFilters();
      render();
    }

    els.search.oninput = (e) => { state.filters.search = e.target.value; render(); };
    els.category.onchange = (e) => { state.filters.category = e.target.value; render(); };
    els.country.onchange = (e) => { state.filters.country = e.target.value; render(); };
    els.btnFav.onclick = () => { state.filters.favs = !state.filters.favs; els.btnFav.classList.toggle('active'); render(); };
    els.btnPin.onclick = () => { state.filters.pins = !state.filters.pins; els.btnPin.classList.toggle('active'); render(); };
    els.btnPinCur.onclick = () => { if (!state.selected) return; state.pins.has(state.selected.name) ? state.pins.delete(state.selected.name) : state.pins.add(state.selected.name); localStorage.setItem('iptv-pinned', JSON.stringify([...state.pins])); render(); play(state.selected); };
    els.btnFavCur.onclick = () => { if (!state.selected) return; state.favs.has(state.selected.name) ? state.favs.delete(state.selected.name) : state.favs.add(state.selected.name); localStorage.setItem('iptv-favorites', JSON.stringify([...state.favs])); render(); play(state.selected); };
    els.btnCopyCur.onclick = () => { if (!state.selected) return; navigator.clipboard.writeText(window.location.href); showToast("Link copied!"); };
    els.btnShowSchedule.onclick = showFullDaySchedule;

    init();
  </script>
</body>
</html>
