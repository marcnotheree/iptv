<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>IPTV Dark Hub Pro v2.0</title>
  <style>
    :root {
      --bg: #07090f;
      --panel: #0f121a;
      --panel-2: #161b26;
      --text: #e1e7ff;
      --muted: #848da8;
      --accent: #5e79ff;
      --accent-rgb: 94, 121, 255;
      --success: #2ec4b6;
      --danger: #ff5c7c;
      --border: #22293d;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
      --radius: 16px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 3000;
      transition: var(--transition);
    }

    .sidebar-header { padding: 24px; border-bottom: 1px solid var(--border); }
    .sidebar-header h1 { 
      font-size: 1.3rem; margin: 0; font-weight: 800; 
      background: linear-gradient(to right, #fff, var(--muted)); 
      -webkit-background-clip: text; background-clip: text; 
      -webkit-text-fill-color: transparent; 
    }
    
    .controls { padding: 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; flex: 1; scrollbar-width: thin; }
    .nav-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .filter-group { display: flex; flex-direction: column; gap: 8px; }
    .filter-label { color: var(--accent); font-weight: 800; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }

    input, select {
      width: 100%; background: #0a0d14; color: var(--text); border: 1px solid var(--border);
      padding: 12px 16px; border-radius: 12px; font-size: 0.9rem; outline: none; transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--accent); }

    .nav-btn {
      width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border);
      background: var(--panel-2); color: #fff; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; gap: 12px; transition: var(--transition);
    }
    .nav-btn:hover { border-color: var(--accent); background: rgba(var(--accent-rgb), 0.1); }
    .nav-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(var(--accent-rgb), 0.15); }

    .toggle-btn {
      width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border);
      background: var(--panel-2); color: var(--muted); font-size: 0.85rem; font-weight: 700;
      cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: var(--transition);
    }
    .toggle-btn.active { background: rgba(var(--accent-rgb), 0.1); border-color: var(--accent); color: var(--accent); }

    /* Main Area */
    .main {
      padding: 0;
      overflow-y: auto;
      background: radial-gradient(circle at 50% -20%, #1a1f35 0%, var(--bg) 70%);
      scrollbar-width: thin;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .view-container {
      display: none;
      padding: 30px;
      width: 100%;
      max-width: 1600px;
      margin: 0 auto;
      flex-direction: column;
      gap: 30px;
      animation: fadeIn 0.4s ease;
    }
    .view-container.active { display: flex; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Player View */
    .player-layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 30px;
      align-items: flex-start;
    }

    .player-column { display: flex; flex-direction: column; gap: 15px; min-width: 0; }
    .player-title { font-size: 1.8rem; margin: 0; font-weight: 800; color: #fff; }
    
    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }
    #iframePlayer { width: 100%; height: 100%; display: block; border: none; }

    .epg-container {
      background: rgba(var(--accent-rgb), 0.03);
      border-radius: 20px;
      padding: 24px;
      border: 1px solid rgba(var(--accent-rgb), 0.1);
      display: flex;
      flex-direction: column;
      gap: 20px;
      height: 100%;
    }

    .epg-current { display: flex; flex-direction: column; gap: 10px; }
    .epg-value { color: #fff; font-weight: 700; font-size: 1.1rem; line-height: 1.4; }
    .progress-bar { height: 6px; background: #22293d; border-radius: 3px; width: 100%; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); transition: width 1s linear; }

    .upcoming-list { display: flex; flex-direction: column; gap: 12px; }
    .upcoming-item { display: grid; grid-template-columns: 65px 1fr; gap: 15px; align-items: center; font-size: 0.9rem; color: var(--muted); }
    .upcoming-time { font-weight: 800; color: var(--accent); }
    .upcoming-title { font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Comparison Grid */
    .compare-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .compare-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      transition: var(--transition);
      cursor: pointer;
    }
    .compare-card:hover { border-color: var(--accent); transform: translateY(-4px); }
    .compare-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
    .compare-name { font-weight: 800; font-size: 1.1rem; color: #fff; }
    .compare-live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 10px var(--danger); animation: pulse 1.5s infinite; }
    
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

    /* Grids */
    .section-label { font-size: 1rem; font-weight: 800; margin: 20px 0 15px 0; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
    .channel-card {
      padding: 15px; border-radius: var(--radius); background: var(--panel-2); border: 1px solid var(--border);
      cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; gap: 8px; position: relative;
    }
    .channel-card:hover { border-color: var(--accent); transform: translateY(-4px); }
    .channel-card.active { border-color: var(--accent); background: rgba(var(--accent-rgb), 0.1); }
    .card-title { font-weight: 800; font-size: 0.9rem; margin: 0; color: #fff; line-height: 1.2; padding-right: 25px; }
    .card-meta { display: flex; justify-content: space-between; align-items: center; margin-top: auto; font-size: 0.7rem; color: var(--muted); }
    
    .card-icons { position: absolute; top: 12px; right: 8px; display: flex; flex-direction: column; gap: 6px; z-index: 10; }
    .grid-btn { background: none; border: none; padding: 4px; cursor: pointer; font-size: 0.85rem; opacity: 0.4; transition: opacity 0.2s, transform 0.2s; }
    .grid-btn:hover { opacity: 1; transform: scale(1.2); }
    .grid-btn.active { opacity: 1; }
    .icon-fav.active { color: #ffd700; text-shadow: 0 0 8px rgba(255,215,0,0.5); }
    .icon-pin.active { color: #ff5c7c; text-shadow: 0 0 8px rgba(255,92,124,0.5); }

    /* Modal Overlay */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
    .modal-content { width: 100%; max-width: 700px; max-height: 85vh; background: var(--panel); border-radius: 24px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 30px 100px rgba(0,0,0,1); }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .modal-body { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; scrollbar-width: thin; }

    #welcomeHero { padding: 100px 40px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px; }
    #welcomeHero h2 { font-size: 3.5rem; margin: 0; font-weight: 900; background: linear-gradient(45deg, #fff, var(--accent)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    #welcomeHero p { font-size: 1.2rem; color: var(--muted); max-width: 600px; }

    .menu-btn {
      position: fixed; bottom: 24px; right: 24px; width: 64px; height: 64px; border-radius: 22px;
      background: var(--accent); color: #fff; border: none; box-shadow: 0 10px 30px rgba(var(--accent-rgb), 0.4);
      z-index: 4000; cursor: pointer; display: none; font-size: 1.5rem; justify-content: center; align-items: center;
    }

    .hidden { display: none !important; }
    .skeleton { background: linear-gradient(90deg, var(--panel-2) 25%, var(--border) 50%, var(--panel-2) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    @media (max-width: 1300px) {
      .player-layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: fixed; left: 0; top: 0; width: 300px; height: 100vh; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); box-shadow: 30px 0 100px rgba(0,0,0,0.8); }
      .menu-btn { display: flex; }
      .channel-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
      .compare-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

      {"name": "DISNEY CHANNEL", "embed": "https://canale-tv.net/channel/disneych.html", "category": "Kids", "country": "RO", "slug": "DISNEY"},
      {"name": "NICKELODEON", "embed": "https://canale-tv.net/channel/nickelodeon.html", "category": "Kids", "country": "RO", "slug": "NICKELODEON"},
      {"name": "DISCOVERY CH", "embed": "https://canale-tv.net/channel/discoverych.html", "category": "Documentaries", "country": "RO", "slug": "DISCOVERY"},
      {"name": "HISTORY CHANNEL", "embed": "https://canale-tv.net/channel/historych.html", "category": "Documentaries", "country": "RO", "slug": "HISTORY"},
      {"name": "NATIONAL GEOGRAPHIC", "embed": "https://canale-tv.net/channel/natgeo.html", "category": "Documentaries", "country": "RO", "slug": "NATGEO"},
      {"name": "NAT GEO WILD", "embed": "https://canale-tv.net/channel/natgeowild.html", "category": "Documentaries", "country": "RO", "slug": "NATGEOWILD"},
      {"name": "ZU TV", "embed": "https://canale-tv.net/channel/zutv.html", "category": "Music", "country": "RO", "slug": "ZUTV"},
      {"name": "KISS TV", "embed": "https://canale-tv.net/channel/kisstv.html", "category": "Music", "country": "RO", "slug": "KISS_TV"},
      {"name": "UTV", "embed": "https://canale-tv.net/channel/utv.html", "category": "Music", "country": "RO", "slug": "U_TV"},
      {"name": "TARAF TV", "embed": "https://canale-tv.net/channel/taraf.html", "category": "Music", "country": "RO", "slug": "TARAF_TV"},
      {"name": "ETNO TV", "embed": "https://canale-tv.net/channel/etno.html", "category": "Music", "country": "RO", "slug": "ETNO_TV"}
    ];

    const PROXY_ENINES = [
      'https://corsproxy.io/?',
      'https://api.allorigins.win/get?url='
    ];

    const state = {
      all: [...userChannels],
      favs: new Set(JSON.parse(localStorage.getItem('iptv-favs') || '[]')),
      pins: new Set(JSON.parse(localStorage.getItem('iptv-pins') || '[]')),
      view: 'home',
      filters: { search: '', category: 'all', onlyFavs: false, onlyPins: false },
      selected: null,
      epgData: {},
      isEpgLoaded: false
    };

    const els = {
      sidebar: document.getElementById('sidebar'),
      overlay: document.getElementById('drawerOverlay'),
      menuBtn: document.getElementById('menuBtn'),
      main: document.getElementById('mainScroll'),
      views: { home: document.getElementById('viewHome'), compare: document.getElementById('viewCompare') },
      navs: { home: document.getElementById('navHome'), compare: document.getElementById('navCompare') },
      playerSection: document.getElementById('playerSection'),
      welcomeHero: document.getElementById('welcomeHero'),
      iframe: document.getElementById('iframePlayer'),
      playerTitle: document.getElementById('playerTitle'),
      epgBox: document.getElementById('epgBox'),
      epgNow: document.getElementById('epgNow'),
      epgUpcoming: document.getElementById('epgUpcomingList'),
      epgProgress: document.getElementById('epgProgress'),
      grids: {
        pinned: document.getElementById('pinnedGrid'),
        favs: document.getElementById('favGrid'),
        explore: document.getElementById('exploreGrid'),
        compare: document.getElementById('compareGrid'),
        sections: { pinned: document.getElementById('pinnedSec'), favs: document.getElementById('favSec') }
      },
      counts: { fav: document.getElementById('favCount'), pin: document.getElementById('pinCount') },
      search: document.getElementById('searchInput'),
      category: document.getElementById('categorySelect'),
      btnFavs: document.getElementById('toggleFavs'),
      btnPins: document.getElementById('togglePins')
    };

    async function loadEPG() {
      const targetUrl = 'https://program-tv.ro/program-tv-acum/';
      
      for (const proxy of PROXY_ENINES) {
        try {
          const res = await fetch(proxy + encodeURIComponent(targetUrl), { signal: AbortSignal.timeout(10000) });
          if (!res.ok) continue;

          let html = "";
          if (proxy.includes("allorigins")) {
            const json = await res.json();
            html = json.contents;
          } else {
            html = await res.text();
          }

          if (!html || html.length < 5000) continue;

          const parser = new DOMParser();
          const doc = parser.parseFromString(html, "text/html");
          const rows = doc.querySelectorAll(".striped_table_row");
          const newEpg = {};

          rows.forEach(row => {
            const channelLink = row.querySelector("a.channelheaderlink");
            if (!channelLink) return;
            const slug = channelLink.getAttribute("href").split("/").pop();
            
            const parseCol = (selector) => {
              const col = row.querySelector(selector);
              if (!col) return null;
              const timeEl = col.querySelector(".smartpe_time_3col");
              const titleEl = col.querySelector(".smartpe_progtitle a");
              return (timeEl && titleEl) ? { time: timeEl.textContent.trim(), title: titleEl.textContent.trim() } : null;
            };

            const now = parseCol(".data_left_3col");
            const next = parseCol(".data_middle_3col");
            const later = parseCol(".data_right_3col");

            if (now) {
              let progress = 0;
              if (next) {
                const roNow = new Date(new Date().toLocaleString("en-US", {timeZone: "Europe/Bucharest"}));
                const [nh, nm] = now.time.split(":").map(Number);
                const [nxth, nxtm] = next.time.split(":").map(Number);
                const startTime = new Date(roNow); startTime.setHours(nh, nm, 0);
                const endTime = new Date(roNow); endTime.setHours(nxth, nxtm, 0);
                if (endTime < startTime) endTime.setDate(endTime.getDate() + 1);
                if (roNow < startTime) startTime.setDate(startTime.getDate() - 1);
                progress = ((roNow - startTime) / (endTime - startTime)) * 100;
              }
              newEpg[slug] = { now, next, later, progress: Math.min(100, Math.max(0, progress)) };
            }
          });

          if (Object.keys(newEpg).length > 5) {
            state.epgData = newEpg;
            state.isEpgLoaded = true;
            if (state.selected) updateEPG();
            if (state.view === 'compare') renderCompare();
            return;
          }
        } catch (e) { console.warn("EPG: Engine failed"); }
      }
    }

    async function showFullSchedule(channel) {
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal-content">
          <div class="modal-header">
            <h2 style="margin:0; color:#fff;">${channel.name} Schedule</h2>
            <button class="nav-btn" style="width:auto; padding:8px 15px;" onclick="this.closest('.modal-overlay').remove()">✕</button>
          </div>
          <div class="modal-body" id="fullSchBody">
            <div style="padding:40px; text-align:center;"><div class="skeleton" style="height:30px; width:200px; margin:0 auto;"></div><p>Fetching full daily schedule...</p></div>
          </div>
        </div>`;
      document.body.appendChild(modal);
      modal.onclick = (e) => { if(e.target === modal) modal.remove(); };

      const scheduleUrl = `https://program-tv.ro/program-tv/${channel.slug}`;
      for (const proxy of PROXY_ENINES) {
        try {
          const res = await fetch(proxy + encodeURIComponent(scheduleUrl));
          const html = proxy.includes("allorigins") ? (await res.json()).contents : await res.text();
          const doc = new DOMParser().parseFromString(html, "text/html");
          const programs = doc.querySelectorAll(".smartpe_progentry_3col");
          
          if (programs.length > 0) {
            let htmlList = "";
            programs.forEach(p => {
              const time = p.querySelector(".smartpe_time_3col")?.textContent.trim();
              const title = p.querySelector(".smartpe_progtitle a")?.textContent.trim();
              if (time && title) {
                htmlList += `
                  <div style="padding:15px; border-radius:12px; background:var(--panel-2); border: 1px solid var(--border); display: flex; gap: 20px; align-items: center;">
                    <b style="color:var(--accent); min-width: 60px;">${time}</b>
                    <span style="font-weight:700; color:#fff;">${title}</span>
                  </div>`;
              }
            });
            document.getElementById('fullSchBody').innerHTML = htmlList;
            return;
          }
        } catch (e) { }
      }
      document.getElementById('fullSchBody').innerHTML = '<div style="padding:40px; text-align:center; color:var(--danger);">Failed to load daily schedule. Try again later.</div>';
    }

    function toggleFavorite(e, name) {
      e.stopPropagation();
      state.favs.has(name) ? state.favs.delete(name) : state.favs.add(name);
      localStorage.setItem('iptv-favs', JSON.stringify([...state.favs]));
      render();
    }

    function togglePin(e, name) {
      e.stopPropagation();
      state.pins.has(name) ? state.pins.delete(name) : state.pins.add(name);
      localStorage.setItem('iptv-pins', JSON.stringify([...state.pins]));
      render();
    }

    function play(channel) {
      state.selected = channel;
      els.welcomeHero.style.display = 'none';
      els.playerSection.classList.remove('hidden');
      els.playerTitle.textContent = channel.name;
      els.iframe.src = channel.embed;
      
      document.getElementById('btnPinCur').onclick = (e) => togglePin(e, channel.name);
      document.getElementById('btnFavCur').onclick = (e) => toggleFavorite(e, channel.name);
      document.getElementById('btnPinCur').classList.toggle('active', state.pins.has(channel.name));
      document.getElementById('btnFavCur').classList.toggle('active', state.favs.has(channel.name));

      updateEPG();
      render();
      switchView('home');
    }

    function updateEPG() {
      if (!state.selected) return;
      els.epgBox.classList.remove('hidden');
      if (!state.isEpgLoaded) { els.epgNow.textContent = "Syncing live data..."; return; }

      const data = state.epgData[state.selected.slug];
      if (data) {
        els.epgNow.textContent = data.now.title;
        els.epgProgress.style.width = data.progress + '%';
        let upHtml = "";
        if (data.next) upHtml += `<div class="upcoming-item"><span class="upcoming-time">${data.next.time}</span><span class="upcoming-title">${data.next.title}</span></div>`;
        if (data.later) upHtml += `<div class="upcoming-item"><span class="upcoming-time">${data.later.time}</span><span class="upcoming-title">${data.later.title}</span></div>`;
        els.epgUpcoming.innerHTML = upHtml || '<div style="color:var(--muted);">No upcoming data</div>';
      } else {
        els.epgNow.textContent = "Schedule Unavailable";
        els.epgUpcoming.innerHTML = "";
      }
    }

    function renderCompare() {
      const targets = state.all.filter(c => state.pins.has(c.name) || state.favs.has(c.name));
      if (!targets.length) {
        els.grids.compare.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 100px 20px; color: var(--muted); border: 2px dashed var(--border); border-radius: 20px;"><h3>No monitored channels</h3><p>Pin or Favorite channels from the Home Explorer to monitor them here.</p></div>';
        return;
      }
      els.grids.compare.innerHTML = targets.map(c => {
        const data = state.epgData[c.slug];
        let content = `<div class="compare-header"><span class="compare-name">${c.name}</span></div><div style="padding:20px; color:var(--muted);">EPG loading...</div>`;
        if (data) {
          content = `<div class="compare-header"><span class="compare-name">${c.name}</span><div class="compare-live-dot"></div></div><div class="epg-current"><span class="filter-label" style="font-size:0.6rem;">Now Playing (${data.now.time})</span><span class="epg-value" style="font-size: 1rem; color: var(--accent);">${data.now.title}</span><div class="progress-bar"><div class="progress-fill" style="width: ${data.progress}%"></div></div></div><div style="margin-top:10px; font-size:0.8rem; color:var(--muted);">Next: ${data.next ? data.next.title : '---'}</div>`;
        }
        return `<div class="compare-card" onclick="window.playByName('${c.name}')">${content}</div>`;
      }).join('');
    }

    function render() {
      const q = state.filters.search.toLowerCase();
      const filtered = state.all.filter(c => {
        const ms = c.name.toLowerCase().includes(q);
        const mc = state.filters.category === 'all' || c.category === state.filters.category;
        const mf = !state.filters.onlyFavs || state.favs.has(c.name);
        const mp = !state.filters.onlyPins || state.pins.has(c.name);
        return ms && mc && mf && mp;
      });
      const pinned = filtered.filter(c => state.pins.has(c.name));
      const favs = filtered.filter(c => state.favs.has(c.name) && !state.pins.has(c.name));
      const others = filtered.filter(c => !state.pins.has(c.name) && !state.favs.has(c.name));
      
      const drawGrid = (container, list) => {
        container.innerHTML = list.map(c => {
          const hasFav = state.favs.has(c.name);
          const hasPin = state.pins.has(c.name);
          return `
          <div class="channel-card ${state.selected?.name === c.name ? 'active' : ''}" onclick="window.playByName('${c.name}')">
            <div class="card-icons">
              <button class="grid-btn icon-pin ${hasPin ? 'active' : ''}" onclick="togglePin(event, '${c.name}')">📌</button>
              <button class="grid-btn icon-fav ${hasFav ? 'active' : ''}" onclick="toggleFavorite(event, '${c.name}')">★</button>
            </div>
            <h3 class="card-title">${c.name}</h3>
            <div class="card-meta"><span>${c.category}</span></div>
          </div>`;
        }).join('') || (q ? '<div style="padding:20px; color:var(--muted);">No matches</div>' : '');
      };
      els.grids.sections.pinned.classList.toggle('hidden', !pinned.length);
      els.grids.sections.favs.classList.toggle('hidden', !favs.length);
      drawGrid(els.grids.pinned, pinned); drawGrid(els.grids.favs, favs); drawGrid(els.grids.explore, others);
      els.counts.fav.textContent = state.favs.size;
      els.counts.pin.textContent = state.pins.size;
    }

    function switchView(target) {
      state.view = target;
      Object.keys(els.views).forEach(k => {
        els.views[k].classList.toggle('active', k === target);
        els.navs[k].classList.toggle('active', k === target);
      });
      if (target === 'compare') renderCompare();
      els.main.scrollTo({ top: 0, behavior: 'smooth' });
      if (window.innerWidth < 1100) closeSidebar();
    }

    window.playByName = (n) => { const c = state.all.find(x => x.name === n); if (c) play(c); };
    function closeSidebar() { els.sidebar.classList.remove('open'); els.overlay.style.opacity = '0'; els.overlay.style.pointerEvents = 'none'; }
    function openSidebar() { els.sidebar.classList.add('open'); els.overlay.style.opacity = '1'; els.overlay.style.pointerEvents = 'auto'; }

    function init() {
      const cats = ['all', ...new Set(state.all.map(c => c.category))].sort();
      els.category.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
      render();
      els.navs.home.onclick = () => switchView('home');
      els.navs.compare.onclick = () => switchView('compare');
      els.search.oninput = (e) => { state.filters.search = e.target.value; render(); };
      els.category.onchange = (e) => { state.filters.category = e.target.value; render(); };
      els.btnFavs.onclick = () => { state.filters.onlyFavs = !state.filters.onlyFavs; els.btnFavs.classList.toggle('active'); render(); };
      els.btnPins.onclick = () => { state.filters.onlyPins = !state.filters.onlyPins; els.btnPins.classList.toggle('active'); render(); };
      els.menuBtn.onclick = openSidebar;
      els.overlay.onclick = closeSidebar;
      document.getElementById('refreshCompare').onclick = () => { loadEPG(); };
      
      document.getElementById('btnSchedule').onclick = () => {
        if (state.selected) showFullSchedule(state.selected);
      };

      document.getElementById('btnShare').onclick = () => {
        const url = window.location.origin + window.location.pathname + "?ch=" + encodeURIComponent(state.selected.name);
        navigator.clipboard.writeText(url).then(() => alert("Link copied!"));
      };

      loadEPG();
      setInterval(loadEPG, 60000); 
    }
    init();
  </script>
